<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ベンゼン配向性シミュレータ</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #333;
            --border-color: #dee2e6;
            --btn-bg: #ffffff;
            --btn-hover: #e9ecef;
            --btn-active: #d1ecf1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
            flex-direction: row;
        }

        #canvas-container {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            cursor: pointer;
        }
        
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #pause-icon {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            color: rgba(44, 62, 80, 0.6);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 5;
        }
        
        #pause-icon svg {
            width: 100%;
            height: 100%;
        }
        
        #pause-icon.show {
            opacity: 1;
        }

        #controls {
            width: 260px;
            background: var(--btn-bg);
            border-left: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            box-shadow: -2px 0 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        h2 {
            font-size: 1.1rem;
            margin-bottom: 10px;
            color: #666;
            text-align: center;
        }
        
        button {
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 14px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: var(--btn-bg);
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            color: #2c3e50;
        }
        
        button:hover { background: var(--btn-hover); }
        button.active {
            border-color: #4a90e2;
            background: var(--btn-active);
            color: #0056b3;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #canvas-container { flex: 2; }
            #controls {
                width: 100%;
                flex: 1;
                border-left: none;
                border-top: 1px solid var(--border-color);
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                align-content: flex-start;
                padding: 15px;
            }
            button {
                flex: 1 1 calc(25% - 10px);
                min-width: 70px;
                padding: 12px;
                font-size: 1.1rem;
                text-align: center;
            }
            h2 { display: none; }
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="app-canvas"></canvas>
        <div id="pause-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="6" y="4" width="4" height="16"></rect>
                <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
        </div>
    </div>

    <div id="controls">
        <h2>Substituents</h2>
    </div>

    <script>
        const canvas = document.getElementById('app-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const controlsDiv = document.getElementById('controls');
        const container = document.getElementById('canvas-container');
        const pauseIcon = document.getElementById('pause-icon');

        const COLORS = {
            green:  { r: 168, g: 230, b: 207 },
            blue:   { r: 140, g: 200, b: 250 },
            orange: { r: 255, g: 180, b: 120 },
            purple: { r: 210, g: 170, b: 235 }
        };

        const SUBSTITUENTS = {
            'H':    { label: 'H',    color: COLORS.green,  weights: [1.00, 1.00, 1.00, 1.00, 1.00, 1.00], type: 0 },
            'OH':   { label: 'OH',   color: COLORS.orange, weights: [1.48, 0.90, 1.48, 0.87, 1.48, 0.87], type: 1 },
            'NH₂':  { label: 'NH2',  color: COLORS.orange, weights: [1.52, 0.90, 1.52, 0.87, 1.52, 0.87], type: 1 },
            'CH₃':  { label: 'CH3',  color: COLORS.orange, weights: [1.16, 0.95, 1.16, 0.93, 1.16, 0.93], type: 1 },
            'Cl':   { label: 'Cl',   color: COLORS.purple, weights: [1.08, 0.89, 1.08, 0.84, 1.08, 0.84], type: 1 },
            'COOH': { label: 'COOH', color: COLORS.blue,   weights: [0.84, 1.12, 0.84, 1.00, 0.84, 1.00], type: -1 },
            'NO₂':  { label: 'NO2',  color: COLORS.blue,   weights: [0.76, 1.16, 0.76, 1.00, 0.76, 1.00], type: -1 },
            'CN':   { label: 'CN',   color: COLORS.blue,   weights: [0.76, 1.16, 0.76, 1.00, 0.76, 1.00], type: -1 }
        };

        let currentSub = 'H';
        
        let actualTargetWeights = [...SUBSTITUENTS['H'].weights];
        let actualTargetColor = { ...SUBSTITUENTS['H'].color };

        Object.keys(SUBSTITUENTS).forEach(key => {
            const btn = document.createElement('button');
            btn.innerHTML = key;
            if (key === 'H') btn.classList.add('active');
            btn.onclick = (e) => {
                e.stopPropagation();
                document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSub = key;
            };
            controlsDiv.appendChild(btn);
        });

        // --------------------------------------------------
        // パーティクル（霧）システム
        // --------------------------------------------------
        const NUM_PARTICLES = 2500;
        const particles = [];
        let pSpriteSize = 0;
        
        function randomGaussian() {
            let u = 0, v = 0;
            while(u === 0) u = Math.random();
            while(v === 0) v = Math.random();
            return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
        }

        for (let i = 0; i < NUM_PARTICLES; i++) {
            particles.push({
                baseAngle: Math.random() * Math.PI * 2,
                offset: 0,
                speed: (Math.random() - 0.5) * 0.005,
                wobblePhase: Math.random() * Math.PI * 2
            });
        }

        const pCanvas = document.createElement('canvas');
        const pCtx = pCanvas.getContext('2d');
        let lastColorStr = '';
        let lastAlpha = 0; 

        let currentR = 0;
        let sigmaR = 0;

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            const w = container.clientWidth;
            const h = container.clientHeight;
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            ctx.scale(dpr, dpr);

            currentR = Math.min(w, h) * 0.22;
            sigmaR = currentR * 0.10; 
            
            particles.forEach(p => {
                p.offset = randomGaussian() * sigmaR;
            });

            pSpriteSize = Math.round(currentR * 0.7); 
            pCanvas.width = pSpriteSize;
            pCanvas.height = pSpriteSize;
            lastColorStr = ''; 
        }
        window.addEventListener('resize', resize);
        resize();

        function updateParticleSprite(r, g, b, centerAlpha) {
            const colorStr = `${Math.round(r)},${Math.round(g)},${Math.round(b)}`;
            if (colorStr === lastColorStr && centerAlpha === lastAlpha) return;
            
            pCtx.clearRect(0, 0, pSpriteSize, pSpriteSize);
            const grad = pCtx.createRadialGradient(pSpriteSize/2, pSpriteSize/2, 0, pSpriteSize/2, pSpriteSize/2, pSpriteSize/2);
            grad.addColorStop(0, `rgba(${colorStr}, ${centerAlpha})`);
            grad.addColorStop(0.3, `rgba(${colorStr}, ${centerAlpha * 0.4})`); 
            grad.addColorStop(1, `rgba(${colorStr}, 0)`);
            pCtx.fillStyle = grad;
            pCtx.fillRect(0, 0, pSpriteSize, pSpriteSize);
            
            lastColorStr = colorStr;
            lastAlpha = centerAlpha;
        }

        let isPaused = false;
        let simTime = 0;
        let lastFrameTime = performance.now();

        container.addEventListener('click', () => {
            isPaused = !isPaused;
            if (isPaused) {
                pauseIcon.classList.add('show');
            } else {
                pauseIcon.classList.remove('show');
                lastFrameTime = performance.now();
            }
        });

        // --------------------------------------------------
        // メイン描画ループ
        // --------------------------------------------------
        function draw(now) {
            if (!isPaused) {
                const dt = now - lastFrameTime;
                simTime += (dt * 0.9);
            }
            lastFrameTime = now;

            const w = canvas.width / (window.devicePixelRatio || 1);
            const h = canvas.height / (window.devicePixelRatio || 1);
            
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, w, h);

            const cx = w * 0.42;
            const cy = h * 0.5;
            const R = currentR; 
            const cloudR = R * 0.90;

            const targetSub = SUBSTITUENTS[currentSub];

            if (!isPaused) {
                const smoothFactor = 0.015;
                actualTargetColor.r += (targetSub.color.r - actualTargetColor.r) * smoothFactor;
                actualTargetColor.g += (targetSub.color.g - actualTargetColor.g) * smoothFactor;
                actualTargetColor.b += (targetSub.color.b - actualTargetColor.b) * smoothFactor;
                for (let i = 0; i < 6; i++) {
                    actualTargetWeights[i] += (targetSub.weights[i] - actualTargetWeights[i]) * smoothFactor;
                }
            }

            const cycle = 3000;
            const t = (simTime % cycle) / cycle;
            
            const forceMagnitude = (1 - Math.cos(t * Math.PI * 2)) / 2;
            
            const distFromSub = [1, 0, 1, 2, 3, 2];
            const animatedWeights = [];

            for (let i = 0; i < 6; i++) {
                const phaseDelay = distFromSub[i] * 0.06;
                let localT = t - phaseDelay;
                if (localT < 0) localT += 1.0;
                const p = (1 - Math.cos(localT * Math.PI * 2)) / 2;
                animatedWeights[i] = 1.0 + (actualTargetWeights[i] - 1.0) * p;
            }

            let delayedT = t - 0.09;
            if (delayedT < 0) delayedT += 1.0;
            const visualSyncProgress = (1 - Math.cos(delayedT * Math.PI * 2)) / 2;

            let cr = COLORS.green.r + (actualTargetColor.r - COLORS.green.r) * visualSyncProgress;
            let cg = COLORS.green.g + (actualTargetColor.g - COLORS.green.g) * visualSyncProgress;
            let cb = COLORS.green.b + (actualTargetColor.b - COLORS.green.b) * visualSyncProgress;
            
            const baseAlpha = 0.12;
            const alphaOffset = 0.08 * targetSub.type * visualSyncProgress;
            const currentAlpha = baseAlpha + alphaOffset;
            
            updateParticleSprite(cr, cg, cb, currentAlpha);

            ctx.globalCompositeOperation = 'source-over'; 
            const subAngle = -Math.PI / 2 + (Math.PI / 3);
            
            for (let i = 0; i < NUM_PARTICLES; i++) {
                const p = particles[i];
                if (!isPaused) {
                    p.baseAngle += p.speed;
                    if (p.baseAngle > Math.PI * 2) p.baseAngle -= Math.PI * 2;
                    if (p.baseAngle < 0) p.baseAngle += Math.PI * 2;
                }
                let diff = p.baseAngle - subAngle;
                while(diff > Math.PI) diff -= Math.PI * 2;
                while(diff < -Math.PI) diff += Math.PI * 2;
                
                let angleShift = Math.sin(diff) * 0.35 * forceMagnitude * targetSub.type;
                let drawAngle = p.baseAngle + angleShift;
                let a = (drawAngle + Math.PI / 2) % (Math.PI * 2);
                if (a < 0) a += Math.PI * 2;
                let idxFloat = a / (Math.PI / 3);
                let idx1 = Math.floor(idxFloat) % 6;
                let idx2 = (idx1 + 1) % 6;
                let ratio = idxFloat - Math.floor(idxFloat);
                let smoothRatio = (1 - Math.cos(ratio * Math.PI)) / 2;
                let currentW = animatedWeights[idx1] * (1 - smoothRatio) + animatedWeights[idx2] * smoothRatio;
                let globalWobble = 1 + 0.08 * Math.sin(simTime / 1000 + drawAngle * 2);
                
                let r = cloudR * currentW * globalWobble + p.offset;
                let x = cx + r * Math.cos(drawAngle);
                let y = cy + r * Math.sin(drawAngle);
                
                ctx.drawImage(pCanvas, x - pSpriteSize/2, y - pSpriteSize/2);
            }

            ctx.strokeStyle = '#2c3e50';
            ctx.lineWidth = 3.5;
            ctx.lineJoin = 'round';
            ctx.beginPath();
            const hex = [];
            for (let i = 0; i < 6; i++) {
                const a = -Math.PI / 2 + i * (Math.PI / 3);
                hex.push({ x: cx + R * Math.cos(a), y: cy + R * Math.sin(a) });
            }
            ctx.moveTo(hex[0].x, hex[0].y);
            hex.forEach(point => ctx.lineTo(point.x, point.y));
            ctx.closePath();
            ctx.stroke();

            ctx.lineWidth = 2.5;
            const inR = R * 0.80;
            for (let i = 0; i < 6; i += 2) {
                const a1 = -Math.PI / 2 + i * (Math.PI / 3) + 0.12;
                const a2 = -Math.PI / 2 + (i + 1) * (Math.PI / 3) - 0.12;
                ctx.beginPath();
                ctx.moveTo(cx + inR * Math.cos(a1), cy + inR * Math.sin(a1));
                ctx.lineTo(cx + inR * Math.cos(a2), cy + inR * Math.sin(a2));
                ctx.stroke();
            }

            const bondStart = hex[1];
            const bondEnd = { x: bondStart.x + R * 0.5 * Math.cos(subAngle), y: bondStart.y + R * 0.5 * Math.sin(subAngle) };
            ctx.lineWidth = 3.5 + (targetSub.type !== 0 ? forceMagnitude * 2.5 : 0);
            ctx.beginPath();
            ctx.moveTo(bondStart.x, bondStart.y);
            ctx.lineTo(bondEnd.x, bondEnd.y);
            
            if (targetSub.type !== 0) {
                let r = Math.round(44 + (targetSub.color.r - 44) * forceMagnitude * 0.6);
                let g = Math.round(62 + (targetSub.color.g - 62) * forceMagnitude * 0.6);
                let b = Math.round(80 + (targetSub.color.b - 80) * forceMagnitude * 0.6);
                ctx.strokeStyle = `rgb(${r}, ${g}, ${b})`;
            } else {
                ctx.strokeStyle = '#2c3e50';
            }
            ctx.stroke();

            ctx.fillStyle = '#1a252f';
            let labelX = bondEnd.x + Math.round(R * 0.1);

            const fontSize = Math.round(R * 0.4);
            const subFontSize = Math.round(fontSize * 0.5); 
            
            ctx.textBaseline = 'alphabetic';
            const baseY = bondEnd.y + Math.round(fontSize * 0.35);

            for (let char of targetSub.label) {
                if (/[0-9]/.test(char)) {
                    ctx.font = `600 ${subFontSize}px "IBM Plex Sans"`;
                    ctx.fillText(char, labelX, baseY + Math.round(subFontSize * 0.5));
                    labelX += ctx.measureText(char).width;
                } else {
                    ctx.font = `600 ${fontSize}px "IBM Plex Sans"`;
                    ctx.fillText(char, labelX, baseY);
                    labelX += ctx.measureText(char).width;
                }
            }

            requestAnimationFrame(draw);
        }

        requestAnimationFrame(draw);
    </script>
</body>
</html>
