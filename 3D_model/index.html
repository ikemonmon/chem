        function openCompoundPickModal() {
            const listEl = document.getElementById('compound-pick-list');
            listEl.innerHTML = '';
            const list = ssSettings.compounds.split(/,|\n/).map(s => s.trim()).filter(s => s.length > 0);
            if (list.length === 0) {
                const empty = document.createElement('div');
                empty.style.cssText = 'font-size:12px; color:rgba(255,255,255,0.5); padding:8px 0;';
                empty.textContent = '候補分子が設定されていません（SS設定で追加）';
                listEl.appendChild(empty);
            } else {
                list.forEach(name => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'compound-pick-btn';
                    btn.textContent = name;
                    btn.addEventListener('click', () => {
                        searchInput.value = name;
                        searchClear.style.display = 'inline-flex';
                        closeCompoundPickModal();
                        fetchMoleculeData(name);
                        searchInput.blur();
                    });
                    listEl.appendChild(btn);
                });
            }
            document.getElementById('compound-pick-overlay').style.display = 'block';
            document.getElementById('compound-pick-modal').style.display = 'flex';
        }

        function closeCompoundPickModal() {
            document.getElementById('compound-pick-overlay').style.display = 'none';
            document.getElementById('compound-pick-modal').style.display = 'none';
        }
        document.getElementById('compound-pick-close').addEventListener('click', closeCompoundPickModal);
        document.getElementById('compound-pick-overlay').addEventListener('click', closeCompoundPickModal);
        
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value;
                if (query) { fetchMoleculeData(query); searchInput.blur(); }
            }
        });

        const btnStereo = document.getElementById('btn-stereo');
        function updateStereoMode() {
            btnStereo.title = STEREO_TITLES[currentStereoIndex];
            btnStereo.classList.remove('active', 'level-2');
            
            if (currentStereoIndex === 2) {
                btnStereo.innerHTML = `<svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="2"/></svg>`;
            } else if (currentStereoIndex === 0) {
                btnStereo.classList.add('active');
                btnStereo.innerHTML = `<svg viewBox="0 0 24 24"><line x1="5" y1="3" x2="19" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="19" y1="3" x2="5" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
            } else if (currentStereoIndex === 1) {
                btnStereo.classList.add('active', 'level-2');
                btnStereo.innerHTML = `<svg viewBox="0 0 24 24"><path d="M8 21V3M16 21V3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
            }
        }
        btnStereo.addEventListener('click', () => { currentStereoIndex = (currentStereoIndex + 1) % 3; updateStereoMode(); });

        const btnDepth = document.getElementById('btn-depth');
        btnDepth.addEventListener('click', () => {
            currentDepthIndex = (currentDepthIndex + 1) % 3;
            btnDepth.title = DEPTH_TITLES[currentDepthIndex];
            btnDepth.classList.remove('active', 'level-2');
            if (currentDepthIndex === 1) btnDepth.classList.add('active');
            if (currentDepthIndex === 2) btnDepth.classList.add('active', 'level-2');
        });

        const btnModel = document.getElementById('btn-model');
        function updateModelMode() {
            btnModel.title = MODEL_TITLES[currentRenderMode];
            btnModel.classList.remove('level-2', 'active');
            if (currentRenderMode === 'ballstick') {
                btnModel.innerHTML = SVG_BALLSTICK;
            } else if (currentRenderMode === 'spacefilling') {
                btnModel.innerHTML = SVG_SPACEFILLING;
                btnModel.classList.add('level-2');
            } else if (currentRenderMode === 'ghost') {
                btnModel.innerHTML = SVG_GHOST;
                btnModel.classList.add('active');
            }
        }
        btnModel.addEventListener('click', () => {
            if (currentRenderMode === 'ballstick') currentRenderMode = 'spacefilling';
            else if (currentRenderMode === 'spacefilling') currentRenderMode = 'ghost';
            else currentRenderMode = 'ballstick';
            updateModelMode();
            if (window.currentSdfData) buildMoleculeGeometry(window.currentSdfData, true); 
        });

        const btnBg = document.getElementById('btn-bg');
        const bgIconRect = document.getElementById('bg-icon-rect');
        function updateBgMode(mode) {
            currentBgMode = mode;
            scene.background.setHex(BG_COLORS[mode]);
            let fillHex = '#dadada';
            let titleText = 'Background: Gray [b]';
            if (mode === 'white') { fillHex = '#ffffff'; titleText = 'Background: White [b]'; } 
            else if (mode === 'blue') { fillHex = '#eaf4ff'; titleText = 'Background: Blue [b]'; }
            
            btnBg.title = titleText;
            bgIconRect.setAttribute('fill', fillHex);
            bgIconRect.setAttribute('stroke', mode === 'white' ? '#cccccc' : 'currentColor');
            if (window.currentSdfData) buildMoleculeGeometry(window.currentSdfData, true); 
        }
        btnBg.addEventListener('click', () => {
            if (currentBgMode === 'blue') updateBgMode('gray');
            else if (currentBgMode === 'gray') updateBgMode('white');
            else updateBgMode('blue');
        });

        const btnGloss = document.getElementById('btn-gloss');
        if(currentGlossMode) btnGloss.classList.add('active');
        else btnGloss.classList.remove('active');
        btnGloss.addEventListener('click', () => {
            currentGlossMode = !currentGlossMode;
            if (currentGlossMode) btnGloss.classList.add('active');
            else btnGloss.classList.remove('active');
            if (window.currentSdfData) buildMoleculeGeometry(window.currentSdfData, true); 
        });

        const btnAutoRotate = document.getElementById('btn-autorotate');
        async function updateWakeLock() {
            if ('wakeLock' in navigator) {
                if (isAutoRotating && !wakeLock) {
                    try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
                } else if (!isAutoRotating && wakeLock) {
                    wakeLock.release().then(() => { wakeLock = null; });
                }
            }
        }
        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && isAutoRotating) {
                navigator.wakeLock.request('screen').then(wl => wakeLock = wl).catch(() => {});
            }
        });
        btnAutoRotate.addEventListener('click', () => {
            currentRotateIndex = (currentRotateIndex + 1) % 3;
            btnAutoRotate.title = ROTATE_TITLES[currentRotateIndex];
            btnAutoRotate.classList.remove('active', 'level-2');
            
            if (currentRotateIndex === 0) {
                isAutoRotating = false; currentRotateSpeed = 0;
            } else {
                isAutoRotating = true; currentRotateSpeed = ROTATE_SPEEDS[currentRotateIndex];
                if (currentRotateIndex === 1) btnAutoRotate.classList.add('active'); 
                if (currentRotateIndex === 2) btnAutoRotate.classList.add('active', 'level-2'); 
            }
            updateWakeLock();
        });

        // SS UI & Modal logic
        const btnSS = document.getElementById('btn-ss');
        let ssPressTimer;
        let isLongPress = false;

        btnSS.addEventListener('click', () => {
            if (isLongPress) {
                isLongPress = false;
                return;
            }
            startScreenSaver();
        });
        btnSS.addEventListener('contextmenu', (e) => { e.preventDefault(); openSSModal(); });
        btnSS.addEventListener('touchstart', () => {
            isLongPress = false;
            ssPressTimer = setTimeout(() => { isLongPress = true; openSSModal(); }, 500);
        }, { passive: true });
        btnSS.addEventListener('touchend', (e) => {
            clearTimeout(ssPressTimer);
            if (isLongPress) e.preventDefault(); 
        });
        btnSS.addEventListener('selectstart', (e) => { e.preventDefault(); });

        function openSSModal() {
            document.getElementById('ss-compounds').value = ssSettings.compounds;
            document.getElementById('ss-interval').value = ssSettings.interval;
            document.getElementById('ss-speed').value = ssSettings.speed;
            
            const updateSeg = (id, val) => {
                const seg = document.getElementById(id);
                seg.querySelectorAll('.icon-btn').forEach(btn => {
                    if (btn.dataset.val === String(val)) btn.classList.add('active');
                    else btn.classList.remove('active');
                });
            };
            
            updateSeg('seg-order', ssSettings.order); updateSeg('seg-exit', ssSettings.exitMode);
            updateSeg('seg-bg', ssSettings.bg); updateSeg('seg-model', ssSettings.model);
            updateSeg('seg-stereo', ssSettings.stereo); updateSeg('seg-depth', ssSettings.depth); 
            updateSeg('seg-gloss', ssSettings.gloss);
            updateSeg('seg-namedisplay', ssSettings.nameDisplay);
            updateSeg('seg-nameshake', ssSettings.nameShake);
            
            document.getElementById('ss-overlay').style.display = 'block';
            document.getElementById('ss-modal').style.display = 'flex';
        }

        function closeSSModal() {
            document.getElementById('ss-overlay').style.display = 'none';
            document.getElementById('ss-modal').style.display = 'none';
        }
        document.getElementById('ss-close').addEventListener('click', closeSSModal);
        
        function saveSSSettings() { localStorage.setItem('ss_settings', JSON.stringify(ssSettings)); }

        document.getElementById('ss-compounds').addEventListener('change', (e) => { ssSettings.compounds = e.target.value; saveSSSettings(); });
        document.getElementById('ss-interval').addEventListener('change', (e) => { ssSettings.interval = parseInt(e.target.value) || 15; saveSSSettings(); });
        document.getElementById('ss-speed').addEventListener('change', (e) => { ssSettings.speed = parseFloat(e.target.value) || 18; saveSSSettings(); });
        
        document.querySelectorAll('.ss-segment').forEach(seg => {
            seg.addEventListener('click', (e) => {
                const btn = e.target.closest('.icon-btn');
                if (!btn) return;
                seg.querySelectorAll('.icon-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                ssSettings[seg.dataset.key] = btn.dataset.val;
                saveSSSettings();

                if (ssActive && seg.dataset.key === 'nameDisplay') {
                    const labelText = document.getElementById('label-left').textContent;
                    updateNameSprite(labelText);
                }
                if (ssActive && seg.dataset.key === 'nameShake' && nameSprite) {
                    if (ssSettings.nameShake === 'false') {
                        nameSprite.position.y = nameSpriteBaseY;
                        nameSprite.position.x = 0;
                    }
                }
            });
        });

        // Key bindings
        document.addEventListener('keydown', (e) => {
            if (ssActive) {
                if (ssSettings.exitMode === 'strict') {
                    if (e.key === 'Escape' || (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'p')) stopScreenSaver();
                } else {
                    stopScreenSaver();
                }
                return;
            }
            if (e.key === 'Escape') {
                if (document.getElementById('compound-pick-modal').style.display === 'flex') {
                    closeCompoundPickModal();
                    return;
                }
                if (document.getElementById('ss-modal').style.display === 'flex') {
                    closeSSModal();
                    return;
                }
            }
            if (document.activeElement === searchInput) return;
            switch (e.key.toLowerCase()) {
                case 's': btnStereo.click(); break;
                case 'd': btnDepth.click(); break;
                case 'm': btnModel.click(); break;
                case 'b': btnBg.click(); break;
                case 'g': btnGloss.click(); break;
                case 'r': btnAutoRotate.click(); break;
            }
        });

        if (searchInput.value.length > 0) searchClear.style.display = 'inline-flex';

        // ==========================================
        // アプリケーション初期化実行
        // ==========================================
        updateStereoMode();
        updateModelMode();
        updateBgMode(currentBgMode);
        fetchMoleculeData('L-cysteine');
        animate();
    </script>
</body>
</html>
