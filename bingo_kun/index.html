<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元素ビンゴくん</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;700&family=IBM+Plex+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4a90e2;
            --highlight-color: #fff3cd;
            --active-border: #ffc107;
            --bg-color: #f8f9fa;
        }
        body {
            /* 日本語優先で適用し、OSごとの差を抑える */
            font-family: 'IBM Plex Sans JP', 'Noto Sans JP', 'Yu Gothic', 'Meiryo', 'Hiragino Sans', 'IBM Plex Sans', Helvetica, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            color: #333;
            overflow: hidden;
        }
        
        /* ヘッダー */
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px; 
            background: rgba(255,255,255,0.8);
            flex-shrink: 0;
            z-index: 100;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .gear-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 5px;
            color: #666;
            transition: color 0.2s, transform 0.2s;
            display: flex;
            align-items: center;
        }
        .gear-btn:hover {
            color: var(--primary-color);
            transform: rotate(45deg);
        }

        #set-title-display {
            font-weight: bold;
            font-size: 18px;
            color: #444;
            padding-right: 10px;
            border-right: 2px solid #ccc;
            white-space: nowrap;
            cursor: pointer;
            transition: color 0.2s;
        }
        #set-title-display:hover {
            color: var(--primary-color);
        }

        .mode-button-group {
            display: flex;
            background: #e9ecef;
            padding: 4px;
            border-radius: 12px;
            gap: 2px;
        }
        .mode-btn {
            border: none;
            background: transparent;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            color: #666;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mode-btn.active {
            background: white;
            color: var(--primary-color);
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .header-right {
            display: flex;
            gap: 8px;
        }
        .sub-btn {
            padding: 6px 14px;
            font-size: 13px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 8px;
            cursor: pointer;
            color: #666;
            font-weight: bold;
        }

        /* メイン表示エリア */
        .display-area {
            flex: 9; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: white;
            margin: 5px 20px 0;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            position: relative;
            cursor: pointer;
            overflow: hidden; 
        }

        #current-value-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* ギザギザ解消のため、ベースサイズを巨大化 */
        #current-value {
            font-weight: 700; 
            line-height: 1.25;
            padding: 0 0.05em; 
            margin: 0;
            text-align: center;
            font-size: 12vmin; 
            transform-origin: center center;
        }

        /* シャッフル中のみGPUキャッシュを有効化（確定時に外して高解像度化） */
        .animating-text {
            will-change: transform;
        }

        .shuffling-text, .shuffling-text * { color: #ccc !important; }
        .layout-1line {
            white-space: nowrap !important;
            display: inline-block;
            max-width: none;
            word-break: normal;
            overflow-wrap: normal;
            letter-spacing: -0.015em;
        }
        
        /* IBM Plex Sans に合わせた安全マージン */
        .layout-multiline { 
            white-space: normal; 
            word-break: normal; 
            overflow-wrap: break-word; 
            max-width: 9.5em; 
        }

        /* -------------------------------------------
           化学式の文字位置調整
        ------------------------------------------- */
        sub, sup {
            position: relative; 
            vertical-align: baseline; 
        }
        sub { 
            font-size: 0.45em; 
            bottom: -0.1em; 
        }
        sup { 
            font-size: 0.45em; 
            top: -1.2em; 
        }
        .subscript-number { 
            position: relative; 
            font-size: 0.45em; 
            top: 0.1em; 
            margin-right: 0.05em; 
        }
        .history-item .subscript-number { 
            font-size: 0.5em; 
        }
        /* ------------------------------------------- */

        .action-btn {
            padding: 20px 50px;
            font-size: 32px;
            font-weight: bold;
            color: white;
            background-color: var(--primary-color);
            border: none;
            border-radius: 50px;
            box-shadow: 0 6px 0px #357abd;
            cursor: pointer;
            transition: all 0.1s;
            z-index: 10;
        }
        .action-btn:active { transform: translateY(3px); box-shadow: 0 3px 0px #357abd; }

        #page-number { position: absolute; bottom: 12px; left: 15px; font-size: 18px; font-weight: bold; color: #ccc; }

        /* 履歴エリア */
        .history {
            flex: 5; 
            overflow-y: auto;
            background: #f1f3f5;
            margin: 5px 20px 20px;
            padding: 15px;
            border-radius: 20px;
            box-sizing: border-box;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }
        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 0;
            margin: 0;
            list-style: none;
            justify-content: center;
        }
        .history-item {
            background: #fff;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 26px;
            font-weight: bold;
            border: 2px solid #e9ecef;
        }
        .history-item.active {
            background-color: var(--highlight-color);
            border-color: var(--active-border);
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        /* カスタムシステムモーダル */
        .sys-modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 4000;
            justify-content: center;
            align-items: center;
        }
        .sys-modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
            display: flex;
            flex-direction: column;
            max-height: 90dvh;
        }
        #sys-modal-msg {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 25px;
            line-height: 1.5;
            white-space: pre-wrap;
            overflow-y: auto;
            text-align: left;
        }
        .sys-modal-buttons { display: flex; gap: 15px; justify-content: center; }
        .sys-btn { padding: 10px 25px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 15px; }
        .sys-btn-primary { background: var(--primary-color); color: white; }
        .sys-btn-danger { background: #dc3545; color: white; }
        .sys-btn-secondary { background: #e9ecef; color: #333; }

        /* セット選択モーダル */
        #set-selector-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 4500;
            justify-content: center;
            align-items: center;
        }
        .set-selector-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
            max-height: 80dvh;
            display: flex;
            flex-direction: column;
        }
        .set-selector-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }
        .set-selector-list {
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        .set-selector-btn {
            padding: 12px 20px;
            border-radius: 8px;
            border: 2px solid #e9ecef;
            background: #fff;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            color: #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .set-selector-btn:hover {
            border-color: var(--primary-color);
            background: #f8f9fa;
        }
        .set-selector-btn.active-set {
            border-color: var(--primary-color);
            background: #f0f7ff;
            color: var(--primary-color);
        }

        .shaking { animation: blink 0.08s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* 設定オーバーレイ */
        #settings-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 2000;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .settings-header {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ddd;
            gap: 15px;
        }
        .settings-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .settings-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* アイコンボタン */
        .icon-btn {
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            color: #444;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            position: relative;
        }
        .icon-btn:hover { background: #f1f3f5; border-color: #bbb; color: var(--primary-color); }
        .icon-btn svg { width: 20px; height: 20px; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; fill: none; stroke: currentColor; }
        .icon-btn-danger:hover { color: #dc3545; }

        .settings-actions { display: flex; gap: 10px; }

        .table-container {
            flex: 1;
            overflow-x: auto; /* ★横スクロール対応 */
            overflow-y: auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f1f3f5; position: sticky; top: 0; z-index: 10; padding: 8px 6px; border-bottom: 2px solid #dee2e6; font-size: 14px; white-space: nowrap; }
        td { padding: 6px 6px; border-bottom: 1px solid #eee; }
        
        /* ★ヘッダーセルのズレ防止（Flexbox化） */
        .th-content { display: flex; flex-direction: column; gap: 5px; }

        /* ★入力枠（通常） */
        td input[type="text"] { 
            min-width: 65px; 
            padding: 6px 2px 6px 6px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-size: 14px; 
            transition: all 0.2s; 
        }
        /* ヘッダー/カード入力欄はJSで自動幅調整 */
        .head-input {
            width: 80px;
            min-width: 65px;
            max-width: 420px;
            padding: 6px 2px 6px 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
            transition: all 0.2s;
            margin-left: 0;
            align-self: flex-start;
        }
        .item-input {
            width: 64px;
            min-width: 56px;
            max-width: 260px;
        }
        
        input[readonly] { background-color: #f8f9fa; color: #6c757d; }
        .num-col { width: 30px; text-align: center; color: #999; font-weight: bold; font-size: 12px; }
        .check-col { width: 40px; text-align: center; }
        .error-cell { background-color: #ffe6e6 !important; border: 2px solid #dc3545 !important; }

        /* Excelペーストエリア */
        #paste-container { display: none; margin-bottom: 10px; }
        #paste-area { width: 100%; height: 80px; padding: 10px; box-sizing: border-box; border: 2px dashed var(--primary-color); border-radius: 8px; resize: vertical; font-size: 12px; }

        /* カスタムツールチップ */
        .custom-tooltip {
            position: absolute;
            background: rgba(30, 30, 30, 0.9);
            color: #fff;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 5000;
            white-space: nowrap;
            transform: translate(-50%, -100%);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .custom-tooltip::after {
            content: '';
            position: absolute;
            top: 100%; left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: rgba(30, 30, 30, 0.9) transparent transparent transparent;
        }

        /* 並べ替えモーダル */
        .sort-list-container {
            max-height: 60vh;
            overflow-y: auto;
            text-align: left;
            margin-bottom: 20px;
        }
        #sort-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        #sort-list li {
            padding: 12px 15px;
            background: #fff;
            border: 1px solid #ddd;
            margin-bottom: 8px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: grab;
            user-select: none;
            transition: transform 0.1s;
        }
        #sort-list li:active { cursor: grabbing; }
        #sort-list li.dragging { opacity: 0.5; background: #f8f9fa; }
        .drag-handle { color: #aaa; cursor: grab; }

        /* インポート・プレビューモーダル */
        .import-preview-container {
            display: flex;
            gap: 20px;
            text-align: left;
            height: 50vh;
            min-height: 300px;
        }
        .import-list-pane { flex: 1; border-right: 1px solid #eee; padding-right: 15px; overflow-y: auto; display: flex; flex-direction: column; }
        .import-detail-pane { flex: 1.5; overflow-y: auto; padding-left: 5px; }
        .import-set-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .import-set-item:hover { background: #f8f9fa; }
        .import-set-item.selected-for-preview { border-color: var(--primary-color); background: #f0f7ff; }
        .conflict-warn { color: #dc3545; font-size: 12px; margin-left: auto; display: flex; align-items: center; gap:4px;}
        .preview-cards { display: flex; flex-wrap: wrap; gap: 6px; }
        .preview-card { background: #eee; padding: 4px 8px; border-radius: 4px; font-size: 12px; }

        /* ワイドモーダル */
        .sys-modal-content.wide { max-width: 700px; }
        .hidden-initial { display: none; }
        .settings-title-row { display: flex; gap: 10px; align-items: center; }
        .settings-select { font-size: 16px; padding: 6px; border-radius: 6px; width: 220px; }
        .settings-title-input { font-size: 16px; padding: 6px; width: 180px; border-radius: 6px; border: 1px solid #ccc; }
        .settings-save-btn { padding: 6px 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .file-input-hidden { display: none; }
        .relative-wrap { position: relative; }
        .grow-spacer { flex-grow: 1; }
        .danger-border { border-color: #f5c6cb; }
        .bottom-align { vertical-align: bottom; }
        .sort-help-text { font-size: 12px; color: #666; }
        .paste-preview-wrap { max-height: 400px; overflow-y: auto; text-align: left; font-size: 13px; }
        .paste-preview-title { color: var(--primary-color); font-weight: bold; margin-bottom: 10px; }
        .paste-preview-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        .paste-preview-head { background: #f1f3f5; padding: 5px; border: 1px solid #ddd; }
        .paste-preview-cell { padding: 5px; border: 1px solid #ddd; }
        .paste-preview-cell.error { background: #ffe6e6; color: red; }
        .paste-preview-warn { color: red; font-weight: bold; margin-top: 10px; }
        .import-preview-note { font-size: 13px; color: #666; margin-top: 0; }
        .import-set-label { font-weight: bold; cursor: pointer; }
        .conflict-action { font-size: 11px; }

    </style>
</head>
<body>

    <div class="header-area">
        <div class="header-left">
            <button class="gear-btn" id="open-settings-btn" title="設定を開く">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
            <div id="set-title-display" title="セットを選択">元素記号</div>
            <div class="mode-button-group" id="mode-selector"></div>
        </div>
        <div class="header-right">
            <button class="sub-btn" id="fs-btn">全画面</button>
            <button class="sub-btn" id="reset-trigger">リセット</button>
        </div>
    </div>

    <div class="display-area" id="main-display">
        <button id="start-overlay-btn" class="action-btn">スタート</button>
        <div id="current-value-container" class="hidden-initial">
            <div id="current-value"></div>
        </div>
        <button id="end-reset-btn" class="action-btn hidden-initial">スタートに戻る</button>
        <div id="page-number"></div>
    </div>

    <div class="history">
        <ul id="history-list" class="history-list"></ul>
    </div>

    <div id="sys-modal" class="sys-modal-overlay">
        <div class="sys-modal-content" id="sys-modal-content-box">
            <div id="sys-modal-msg"></div>
            <div class="sys-modal-buttons">
                <button class="sys-btn sys-btn-secondary hidden-initial" id="sys-modal-no">キャンセル</button>
                <button class="sys-btn sys-btn-primary" id="sys-modal-ok">OK</button>
                <button class="sys-btn sys-btn-danger hidden-initial" id="sys-modal-yes">はい</button>
            </div>
        </div>
    </div>

    <div id="set-selector-modal">
        <div class="set-selector-content">
            <div class="set-selector-title">セットを選択</div>
            <div class="set-selector-list" id="set-selector-list"></div>
            <div class="sys-modal-buttons">
                <button class="sys-btn sys-btn-secondary" id="set-selector-close">閉じる</button>
            </div>
        </div>
    </div>

    <div id="settings-overlay">
        <div class="settings-header">
            <div class="settings-top-row">
                <div class="settings-title-row">
                    <select id="set-select" class="settings-select"></select>
                    <input type="text" id="set-title-input" class="settings-title-input" maxlength="15" placeholder="セット名">
                </div>
                <div class="settings-actions">
                    <button class="btn sub-btn" id="close-settings-btn">キャンセル</button>
                    <button class="btn sys-btn-primary settings-save-btn" id="save-settings-btn">反映して戻る</button>
                </div>
            </div>

            <div class="settings-toolbar">
                <button class="icon-btn" id="btn-new-set" data-tooltip="空のセットを新規作成">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                </button>
                <button class="icon-btn" id="btn-copy-set" data-tooltip="現在のセットを複製">
                    <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </button>
                <button class="icon-btn" id="btn-toggle-paste" data-tooltip="Excelからデータを貼付">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                </button>
                <button class="icon-btn" id="btn-sort-sets" data-tooltip="セットの並べ替え">

    function loadConfig() {
        let conf = localStorage.getItem(STORAGE_KEY);
        if (conf) {
            try { 
                const parsed = JSON.parse(conf);
                let loadedData = null;
                
                if (parsed.appIdentifier === APP_IDENTIFIER && parsed.data) {
                    loadedData = parsed.data;
                } else if (parsed && parsed.sets && Array.isArray(parsed.sets)) {
                    loadedData = parsed;
                }
                
                if (loadedData) {
                    loadedData.sets.forEach(s => { if(!s.id) s.id = generateId(); });
                    
                    // 既存データ保持のまま、保護セットのみ最新定義で上書き更新
                    const freshDefaults = createDefaultConfig();
                    const freshProtected = freshDefaults.sets.find(s => s.isProtected);
                    const protectedIdx = loadedData.sets.findIndex(s => s.isProtected);
                    
                    if (protectedIdx !== -1 && freshProtected) {
                        loadedData.sets[protectedIdx].modes = freshProtected.modes;
                        loadedData.sets[protectedIdx].items = freshProtected.items;
                    }
                    
                    return loadedData;
                }
            } catch(e) { console.error("Data load error", e); }
        }
        return createDefaultConfig();
    }

    function saveConfig() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
            appIdentifier: APP_IDENTIFIER,

    // ==========================================
    // 3. 文字列計算・変換（化学式ルール）
    // ==========================================
    function calcPoint(rawStr) {
        if(!rawStr) return 0;
        let str = rawStr.replace(/\/\//g, '').replace(/<>/g, '').replace(/>/g, '').replace(/_{1,2}/g, '').replace(/\^/g, '');
        let pt = 0;
        for(let i=0; i<str.length; i++) pt += (str.charCodeAt(i) <= 0x7F) ? 1 : 2;
        return pt;
    }

    function isEffectivelyEmptySegment(seg) {
        if (seg === null || seg === undefined) return true;
        // ゼロ幅系（念のため）と通常空白を除去して判定
        const cleaned = String(seg).replace(/[\u200B\u200C\u200D\uFEFF]/g, '').trim();
        return cleaned === '';
    }

    function formatChemicalFormula(text) {
        if (!text) return "";
        // //の前後が空だと空行が混ざって余計に改行されるため、空要素は除外する
        let lines = text.split('//').filter(part => !isEffectivelyEmptySegment(part));
        return lines.map(part => {
            let f = part;
            f = f.replace(/<>/g, '⇌').replace(/>/g, '→');
            f = f.replace(/\^([\d\+\-]+)/g, (match, p1) => {
                const fw = p1.replace(/[0-9]/g, s => String.fromCharCode(s.charCodeAt(0) + 0xFEE0)).replace(/\+/g, '＋').replace(/\-/g, '－');
                return `<sup>${fw}</sup>`;
            });
            f = f.replace(/_{1,2}(\d+)/g, '<span class="subscript-number">$1</span>');
            f = f.replace(/([A-Za-z\)])(\d+)/g, "$1<sub>$2</sub>");
            return f;
        }).join('<br>');
    }

    const displayVal = document.getElementById('current-value');
    let singleLineLimitWidth = null;
    const singleLineMeasureEl = document.createElement('span');
    singleLineMeasureEl.style.position = 'absolute';
    singleLineMeasureEl.style.visibility = 'hidden';
    singleLineMeasureEl.style.pointerEvents = 'none';
    singleLineMeasureEl.style.left = '-9999px';
    singleLineMeasureEl.style.top = '-9999px';
    singleLineMeasureEl.className = 'layout-1line';
    document.body.appendChild(singleLineMeasureEl);

    function measureDisplayWidthFromHtml(html) {
        const cs = getComputedStyle(displayVal);
        singleLineMeasureEl.style.fontFamily = cs.fontFamily;
        singleLineMeasureEl.style.fontSize = cs.fontSize;
        singleLineMeasureEl.style.fontWeight = cs.fontWeight;
        singleLineMeasureEl.style.lineHeight = cs.lineHeight;
        singleLineMeasureEl.style.letterSpacing = cs.letterSpacing;
        singleLineMeasureEl.style.padding = cs.padding;
        singleLineMeasureEl.innerHTML = html || '';
        return Math.ceil(singleLineMeasureEl.getBoundingClientRect().width);
    }

    function getSingleLineLimitWidth() {
        if (singleLineLimitWidth !== null) return singleLineLimitWidth;
        // 「全角8文字」を1行表示の基準幅とする
        // 文字種（特にカタカナ）によって実幅が微妙に変わるため、代表文字の最大値で吸収する
        const probeChars = ['ア','カ','サ','タ','ナ','ハ','マ','ヤ','ラ','ワ','ン','ガ','パ','ー','ウ','オ','ク','ゲ'];
        const widths = probeChars.map(ch => measureDisplayWidthFromHtml(ch.repeat(8)));
        singleLineLimitWidth = Math.ceil(Math.max(...widths) * 1.02); // 少し余裕を持つ
        return singleLineLimitWidth;
    }
    
    function prepareLayoutClass(rawText) {
        displayVal.classList.remove('layout-1line', 'layout-multiline');
        const manualLines = String(rawText || '').split('//').filter(p => !isEffectivelyEmptySegment(p));
        if (manualLines.length >= 2) {
            displayVal.classList.add('layout-multiline');
            displayVal.style.whiteSpace = 'normal';
            displayVal.style.maxWidth = '9.5em';
            return;
        }
        // メイン画面表示は従来どおり 8文字相当までを1行扱い
        const pt = calcPoint(rawText || '');
        if (pt <= DISPLAY_SINGLE_LINE_PT) {
            displayVal.classList.add('layout-1line');
            // CSSの競合/環境差を最後の保険として inline で上書き
            displayVal.style.whiteSpace = 'nowrap';
            displayVal.style.maxWidth = 'none';
            displayVal.style.overflowWrap = 'normal';
            displayVal.style.wordBreak = 'normal';
        } else {
            displayVal.classList.add('layout-multiline');
            displayVal.style.whiteSpace = 'normal';
            displayVal.style.maxWidth = '9.5em';
            displayVal.style.overflowWrap = 'break-word';
            displayVal.style.wordBreak = 'normal';
        }
    }

    function adjustScaleToFit() {
        displayVal.style.transform = 'scale(1)';
        const cw = displayVal.offsetWidth, ch = displayVal.offsetHeight;
        if(cw === 0 || ch === 0) return;
        const mainContainer = document.getElementById('current-value-container');
        let scale = Math.min((mainContainer.clientWidth * 0.9) / cw, (mainContainer.clientHeight * 0.9) / ch);
        displayVal.style.transform = `scale(${Math.min(scale, 3)})`;
    }

    // ==========================================
    // 4. 音声・フルスクリーン
    // ==========================================
    const AudioContextDef = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null; let audioAllowed = false;
    function unlockAudio() {
        if (!audioCtx) audioCtx = new AudioContextDef();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        audioAllowed = true;
    }
    window.addEventListener('click', unlockAudio, { once: true });
    window.addEventListener('keydown', unlockAudio, { once: true });
    
    function playTone(freq, duration, type = 'sine', vol = 0.3) {
        if (!audioAllowed) return; 
        if (!audioCtx) audioCtx = new AudioContextDef();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    // ==========================================
    // 5. ビンゴロジック (ハイパフォーマンス版)
    // ==========================================
    let shuffled = []; let currentIndex = -1; let isStarted = false; let isAnimating = false;
    let currentModeIndex = 0; let activeSet = null;

    const startBtn = document.getElementById('start-overlay-btn');

    function resetBingo() {

        resetBingo();

    function changeMode(idx) {
        currentModeIndex = idx;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.index) === idx));
        if (isStarted && currentIndex >= 0) {

    function handleAction() {
        if (isAnimating || sysModal.style.display === 'flex' || document.getElementById('settings-overlay').style.display === 'flex' || document.getElementById('set-selector-modal').style.display === 'flex') return;
        if (!isStarted) startBingo();
        else if (currentIndex >= shuffled.length - 1) {
            mainContainer.style.display = 'none'; endResetBtn.style.display = 'block';
            document.getElementById('page-number').innerText = `全語句 (${shuffled.length}) 完了`;
        } else nextStep();
    }

    function startBingo() {
        const activeItems = activeSet.items.filter(i => i.active && i.values.some(v => v !== ""));
        if(activeItems.length === 0) { customAlert("表示できるカードがありません。"); return; }
        shuffled = [...activeItems].sort(() => Math.random() - 0.5);
        isStarted = true; startBtn.style.display = 'none'; mainContainer.style.display = 'flex';
        nextStep();
    }

    function nextStep() {
        isAnimating = true;
        
        // パフォーマンス最適化: 正規表現のDOMキャッシュを作成
        const pool = shuffled.filter(i => (i.values[currentModeIndex] || "").trim() !== "");
        const p = pool.length > 0 ? pool : shuffled;
        const poolFormatted = p.map(item => formatChemicalFormula(item.values[currentModeIndex] || ""));
        
        // ターゲットとなる最終カードのレイアウトクラスを事前適用
        const finalRawText = shuffled[currentIndex + 1].values[currentModeIndex] || "";
        DisplayModule.prepareLayoutClass(finalRawText);
        
        // animating-text (will-change) を付与し、巨大フォントを安全倍率で表示
        displayVal.classList.add('shuffling-text', 'animating-text');
        displayVal.style.transform = 'scale(0.95)';
        
        let count = 0; 
        // ★ 神懸かった緩急: 16枚目（インデックス15）は24回(長く)、それ以外は18回(テンポ良く)
        const is16thCard = (currentIndex + 1 === 15);
        const maxCount = is16thCard ? 24 : 18;
        
        let lastTime = 0;
        let currentInterval = 40;

        function animLoop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const progress = timestamp - lastTime;

            if (progress >= currentInterval) {
                lastTime = timestamp;
                displayVal.innerHTML = poolFormatted[Math.floor(Math.random() * poolFormatted.length)];
                
                // 進行度（0.0 ～ 1.0）
                const progressRatio = count / maxCount;
                
                // 【音の演出】150Hzの低音からスタートし、二次関数で高音へ駆け上がる
                const easeInPitch = Math.pow(progressRatio, 2);
                const pitch = 150 + (easeInPitch * 800);
                playTone(pitch, 0.05, 'triangle', 0.3);
                
                count++;
                
                // 【時間の演出】三次関数で後半に急ブレーキをかける
                const easeOutTime = Math.pow(count / maxCount, 3);
                currentInterval = 40 + (easeOutTime * 360); 
            }

            if (count < maxCount) {
                requestAnimationFrame(animLoop);
            } else {
                // 確定の瞬間: GPUキャッシュを剥がし、超高解像度でレンダリング
                displayVal.classList.remove('shuffling-text', 'animating-text');
                currentIndex++;
                displayVal.innerHTML = formatChemicalFormula(finalRawText);
                
                // 確定したときのみサイズをピタッと調整する
                adjustScaleToFit();
                
                document.getElementById('page-number').innerText = `${currentIndex + 1} / ${shuffled.length}`;
                updateHistory();
                
                // 確定音
                playTone(880, 0.5, 'sine', 0.3); 
                setTimeout(() => playTone(1320, 0.4, 'sine', 0.25), 100); 
                isAnimating = false;
            }
        }
        requestAnimationFrame(animLoop);
    }

    // キーボードによるセル移動
    tbody.addEventListener('keydown', (e) => {
        if (e.isComposing) return; // IME変換中は無視
        
        const target = e.target;
        if (!target.classList.contains('item-input')) return;

        if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'Enter') {
            e.preventDefault(); 
            
            const tr = target.closest('tr');
            const td = target.closest('td');
            if (!tr || !td) return;
            
            const colIndex = Array.from(tr.children).indexOf(td);
            const rowIndex = Array.from(tbody.children).indexOf(tr);
            
            let nextRowIndex = rowIndex;
            if (e.key === 'ArrowUp') {
                nextRowIndex = Math.max(0, rowIndex - 1);
            } else if (e.key === 'ArrowDown' || e.key === 'Enter') {
                nextRowIndex = Math.min(tbody.children.length - 1, rowIndex + 1);
            }
            
            if (nextRowIndex !== rowIndex) {
                const nextTr = tbody.children[nextRowIndex];
                const nextInput = nextTr.children[colIndex].querySelector('input');
                if (nextInput && !nextInput.readOnly) {
                    nextInput.focus();
                }
            }
        }
    });

    function evaluateCellMetrics(rawValue) {
        const val = rawValue || "";
        let totalPt = 0;
        let totalLines = 0;
        const parts = val.split('//');
        parts.forEach(part => {
            // 空要素は空行なので行数には数えない
            if (isEffectivelyEmptySegment(part)) return;
            const pt = calcPoint(part);
            totalPt += pt;
            const wrappedLines = Math.max(1, Math.ceil(pt / CELL_VALIDATION.MAX_LINE_PT));
            totalLines += wrappedLines;
        });
        const isError = totalPt > CELL_VALIDATION.MAX_TOTAL_PT || totalLines > CELL_VALIDATION.MAX_LINES;
        return { totalPt, totalLines, isError };
    }

    function createEmptyItems() {
        return Array(SETTINGS_LAYOUT.ROW_COUNT).fill(null).map(() => ({
            active: false,
            values: Array(SETTINGS_LAYOUT.MODE_COUNT).fill("")
        }));
    }

    function checkCellVal(input) {
        const val = input.value;
        if (!val) {
            input.classList.remove('error-cell');
            input.title = "";
            return;
        }
        const { totalPt, totalLines, isError } = evaluateCellMetrics(val);

        let errMsg = [];
        if (totalPt > CELL_VALIDATION.MAX_TOTAL_PT) errMsg.push(`文字数オーバー: 現在${Math.ceil(totalPt/2)}文字（21文字以内推奨）`);
        if (totalLines > CELL_VALIDATION.MAX_LINES) errMsg.push(`行数オーバー: 自動折り返し含め${totalLines}行（3行以内推奨・1行は全角7文字以内）`);

        if (errMsg.length > 0) {
            input.classList.add('error-cell');
            input.title = "⚠️ エラー:\n" + errMsg.join('\n');
        } else {
            input.classList.remove('error-cell');
            input.title = "";
        }
    }

    // ============================
    // 機能別モジュール定義

    });
    const DisplayModule = Object.freeze({

    });

    const inputWidthMeasureEl = document.createElement('span');
    inputWidthMeasureEl.style.position = 'absolute';
    inputWidthMeasureEl.style.visibility = 'hidden';
    inputWidthMeasureEl.style.pointerEvents = 'none';
    inputWidthMeasureEl.style.left = '-9999px';
    inputWidthMeasureEl.style.top = '-9999px';
    inputWidthMeasureEl.style.whiteSpace = 'pre';
    document.body.appendChild(inputWidthMeasureEl);

    function getInputTargetWidth(input) {
        if (!input) return;
        const cs = getComputedStyle(input);
        inputWidthMeasureEl.style.font = cs.font;
        inputWidthMeasureEl.textContent = input.value || input.placeholder || '';
        const measuredWidth = Math.ceil(inputWidthMeasureEl.getBoundingClientRect().width);

        const minW = parseFloat(cs.minWidth) || 65;
        const maxW = parseFloat(cs.maxWidth) || 420;
        const horizontalPadding = (parseFloat(cs.paddingLeft) || 0) + (parseFloat(cs.paddingRight) || 0) + 2;
        return Math.max(minW, Math.min(measuredWidth + horizontalPadding, maxW));
    }

    function getDeckColumnIndex(input) {
        if (!input) return -1;
        if (input.id && input.id.startsWith('head-m')) return parseInt(input.id.replace('head-m', ''), 10);
        const cls = Array.from(input.classList).find(c => c.startsWith('val-m'));
        return cls ? parseInt(cls.replace('val-m', ''), 10) : -1;
    }

    function syncDeckColumnWidth(colIndex) {
        if (Number.isNaN(colIndex) || colIndex < 0 || colIndex >= SETTINGS_LAYOUT.MODE_COUNT) return;
        const col = document.getElementById(`deck-col-${colIndex}`);
        if (!col) return;
        const headInput = document.getElementById(`head-m${colIndex}`);
        const itemInputs = Array.from(document.querySelectorAll(`.val-m${colIndex}`));
        const targets = [headInput, ...itemInputs].filter(Boolean).map(inp => getInputTargetWidth(inp));
        if (!targets.length) return;
        const nextWidth = Math.ceil(Math.max(...targets));
        col.style.width = `${nextWidth}px`;
        [headInput, ...itemInputs].filter(Boolean).forEach(inp => { inp.style.width = `${nextWidth}px`; });
    }

    function autoSizeInput(input) {
        if (!input) return;
        const colIndex = getDeckColumnIndex(input);
        if (colIndex !== -1) {
            syncDeckColumnWidth(colIndex);
            return;
        }
        const nextWidth = getInputTargetWidth(input);
        if (nextWidth) input.style.width = `${nextWidth}px`;
    }

        html += '<p class="paste-preview-title">以下の内容で現在のデッキを上書きしますか？</p>';
        html += '<table class="paste-preview-table"><tr>';
        for(let c=0; c<SETTINGS_LAYOUT.MODE_COUNT; c++) html += `<th class="paste-preview-head">${rows[0][c] || `デッキ${c+1}(空)`}</th>`;
        html += '</tr>';
        
        let errCnt = 0;
        const parsedItems = [];
        for(let i=0; i<SETTINGS_LAYOUT.ROW_COUNT; i++) {
            const cols = rows[i+1] || [];
            let rHtml = '<tr>';
            let item = { active: false, values: ["","","","",""] };
            for(let c=0; c<SETTINGS_LAYOUT.MODE_COUNT; c++) {
                const val = (cols[c] || "").trim(); item.values[c] = val;
                if(val) item.active = true;
                const metrics = evaluateCellMetrics(val);
                const isErr = metrics.isError;
                
                if(isErr) errCnt++;
                const disp = formatChemicalFormula(val) || '-';
                rHtml += `<td class="paste-preview-cell ${isErr ? 'error' : ''}">${disp}</td>`;
            }
            rHtml += '</tr>';
            parsedItems.push(item);
            if(item.active) html += rHtml;
        }
        html += '</table></div>';
        if(errCnt>0) html += `<p class="paste-preview-warn">⚠️ 文字数や改行制限を超えているセルが ${errCnt} 箇所あります。</p>`;

        // エラーがあっても強制インポート可能に
        customConfirm(html, yes => {
            if(yes) {
                for(let c=0; c<SETTINGS_LAYOUT.MODE_COUNT; c++) { const hi = document.getElementById(`head-m${c}`); hi.value = rows[0][c] ? rows[0][c].trim() : ""; ValidationModule.checkCellVal(hi); }
                initInputAutoSize();
                for(let i=0; i<SETTINGS_LAYOUT.ROW_COUNT; i++) {
                    const tr = document.getElementById(`set-row-${i}`);
                    tr.querySelector('.chk-active').checked = parsedItems[i].active;
                    for(let c=0; c<SETTINGS_LAYOUT.MODE_COUNT; c++) { const inp = tr.querySelector(`.val-m${c}`); inp.value = parsedItems[i].values[c]; ValidationModule.checkCellVal(inp); }
                }
                initInputAutoSize();
            }
        }, errCnt>0 ? "エラーのまま取り込んで修正" : "この内容で上書き", "キャンセル", true, true);
    });

    // ★ エクスポート機能の改修（ドロップダウン廃止、モーダル選択化）
    function downloadJSON(dataObj, filename) {
        const payload = {
            appIdentifier: APP_IDENTIFIER,
            version: "1.0",
            exportDate: new Date().toISOString(),
            data: dataObj
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
        URL.revokeObjectURL(url);
    }

    document.getElementById('btn-export').onclick = () => {
        let html = `
            <div style="text-align: left; max-height: 60vh; overflow-y: auto;">
                <div style="margin-bottom: 15px;">
                    <label style="font-weight:bold; cursor:pointer;"><input type="checkbox" id="export-check-all" checked> すべて選択/解除</label>
                </div>
                <div id="export-list-container" style="display:flex; flex-direction:column; gap:8px;"></div>
            </div>
        `;
        
        customConfirm(html, yes => {
            if(yes) {
                const selectedSets = [];
                document.querySelectorAll('.export-chk-item').forEach((chk, i) => {
                    if (chk.checked) selectedSets.push(config.sets[i]);
                });
                if(selectedSets.length === 0) {
                    customAlert("書き出すセットが選択されていません。");
                    return;
                }
                const exportData = { activeIndex: 0, sets: selectedSets };
                const filename = selectedSets.length === 1 
                    ? `ElementBingo_${selectedSets[0].title}.json` 
                    : `ElementBingo_Export.json`;
                
                downloadJSON(exportData, filename);
            }
        }, "選択したセットをエクスポート", "キャンセル", true);

        const container = document.getElementById('export-list-container');
        const checkAll = document.getElementById('export-check-all');

        config.sets.forEach((set, i) => {
            const div = document.createElement('div');
            div.innerHTML = `<label style="cursor:pointer;"><input type="checkbox" class="export-chk-item" checked> ${set.title} ${set.isProtected ? '<span style="font-size:12px;color:#999;">(保護)</span>' : ''}</label>`;
            container.appendChild(div);
        });

        checkAll.addEventListener('change', (e) => {
            document.querySelectorAll('.export-chk-item').forEach(chk => chk.checked = e.target.checked);
        });

        container.addEventListener('change', (e) => {
            if(e.target.classList.contains('export-chk-item')) {
                const allChks = document.querySelectorAll('.export-chk-item');
                const checkedCount = Array.from(allChks).filter(c => c.checked).length;
                checkAll.checked = (checkedCount === allChks.length && allChks.length > 0);
            }
        });
    };

    const fileInput = document.getElementById('import-file-input');
    document.getElementById('btn-import').onclick = () => { fileInput.value = ''; fileInput.click(); };
    fileInput.onchange = e => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const parsed = JSON.parse(ev.target.result);
                if(parsed.appIdentifier !== APP_IDENTIFIER) { customAlert("このアプリの対応データではありません。"); return; }
                const data = parsed.data;
                const importSets = data.sets ? data.sets : [data]; 
                showImportPreviewModal(importSets);
            } catch(err) { customAlert("ファイルの読み込みに失敗しました。"); }
        };
        reader.readAsText(file);
    };

    // ★ インポート機能の改修（「すべて選択」チェックボックスの追加とプレビュー挙動の改善）
    function showImportPreviewModal(importSets) {
        let html = `
            <div class="import-preview-container">
                <div class="import-list-pane">
                    <div style="margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 8px;">
                        <label style="font-weight:bold; cursor:pointer;"><input type="checkbox" id="import-check-all" checked> すべて選択/解除</label>
                    </div>
                    <div id="import-list-container"></div>
                </div>
                <div class="import-detail-pane">
                    <p class="import-preview-note">プレビュー (左で選択したセットのカード一覧)</p>
                    <div class="preview-cards" id="import-preview-cards">左のリストからセットを選択してください</div>
                </div>
            </div>
        `;
        
        customConfirm(html, yes => {
            if(yes) {
                const selections = document.querySelectorAll('.import-set-item');
                selections.forEach((itemDom, i) => {
                    const chk = itemDom.querySelector('input[type="checkbox"].imp-chk-item');
                    if(chk && chk.checked) {
                        const action = itemDom.querySelector('.conflict-action')?.value || 'add';
                        const targetSet = importSets[i];
                        targetSet.id = generateId(); 
                        if(action === 'overwrite') {
                            const idx = config.sets.findIndex(s => s.title === targetSet.title);
                            if(idx !== -1) config.sets[idx] = targetSet; else config.sets.push(targetSet);
                        } else {
                            if(config.sets.some(s => s.title === targetSet.title)) targetSet.title += " (コピー)";
                            config.sets.push(targetSet);
                        }
                    }
                });
                editingIndex = config.sets.length - 1; populateSettingsUI();
            }
        }, "選択したセットをインポート", "キャンセル", true, true);

        const listContainer = document.getElementById('import-list-container');
        const prevCards = document.getElementById('import-preview-cards');
        const checkAll = document.getElementById('import-check-all');

        function updateCheckAllState() {
            const allChks = document.querySelectorAll('.imp-chk-item');
            const checkedCount = Array.from(allChks).filter(c => c.checked).length;
            checkAll.checked = (checkedCount === allChks.length && allChks.length > 0);
        }

        function showPreview(index) {
            const set = importSets[index];
            document.querySelectorAll('.import-set-item').forEach(el => el.classList.remove('selected-for-preview'));
            if(listContainer.children[index]) listContainer.children[index].classList.add('selected-for-preview');
            
            const validModeIdx = set.modes.findIndex(m => m.trim() !== "");
            const idxToUse = validModeIdx !== -1 ? validModeIdx : 0;
            prevCards.innerHTML = '';
            set.items.filter(item=>item.active).forEach(item => {
                const v = item.values[idxToUse];
                if(v) prevCards.innerHTML += `<div class="preview-card">${formatChemicalFormula(v)}</div>`;
            });
        }

        importSets.forEach((set, i) => {
            const isConflict = config.sets.some(s => s.title === set.title);
            const div = document.createElement('div'); div.className = 'import-set-item';
            
            let inner = `<input type="checkbox" id="imp-chk-${i}" class="imp-chk-item" checked> <label for="imp-chk-${i}" class="import-set-label">${set.title}</label>`;
            if(isConflict) {
                inner += `<div class="conflict-warn">⚠️重複 <select class="conflict-action"><option value="add">別名で追加</option><option value="overwrite">上書き</option></select></div>`;
            }
            div.innerHTML = inner;
            
            div.addEventListener('click', (e) => {
                if(e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT' && e.target.tagName !== 'LABEL') {
                    const chk = div.querySelector('input[type="checkbox"].imp-chk-item'); 
                    chk.checked = !chk.checked;
                    updateCheckAllState();
                } else if (e.target.tagName === 'INPUT') {
                    updateCheckAllState();
                }
                showPreview(i);
            });
            listContainer.appendChild(div);
        });

        checkAll.addEventListener('change', (e) => {
            document.querySelectorAll('.imp-chk-item').forEach(chk => chk.checked = e.target.checked);
        });

        if(importSets.length > 0) showPreview(0);
    }

    document.getElementById('open-settings-btn').onclick = () => { editingIndex = config.activeIndex; populateSettingsUI(); settingsOverlay.style.display = 'flex'; };
    document.getElementById('close-settings-btn').onclick = () => settingsOverlay.style.display = 'none';
    
    document.getElementById('save-settings-btn').onclick = () => {
        if(document.querySelectorAll('.error-cell').length > 0) { customAlert("赤枠のエラー箇所を修正してください。"); return; }
        const set = config.sets[editingIndex];
        
        if (!set.isProtected) {
            const t = document.getElementById('set-title-input').value.trim();
            if(!t) { customAlert("タイトルを入力してください"); return; }
            set.title = t;
            
            let hasMode = false;
            for(let i=0; i<SETTINGS_LAYOUT.MODE_COUNT; i++) { set.modes[i] = document.getElementById(`head-m${i}`).value.trim(); if(set.modes[i]) hasMode = true; }
            if(!hasMode) { customAlert("少なくとも1つのデッキ名を設定してください"); return; }

            let activeCount = 0;
            for (let i = 0; i < SETTINGS_LAYOUT.ROW_COUNT; i++) {
                const tr = document.getElementById(`set-row-${i}`);
                set.items[i].active = tr.querySelector('.chk-active').checked;
                for(let m=0; m<SETTINGS_LAYOUT.MODE_COUNT; m++) set.items[i].values[m] = tr.querySelector(`.val-m${m}`).value.trim();
                if(set.items[i].active && set.items[i].values.some(v=>v!=="")) activeCount++;
            }

            if (activeCount < BINGO_RULES.MIN_ACTIVE_CARDS) { customAlert(`カードが少なすぎます（現在${activeCount}個）。最低${BINGO_RULES.MIN_ACTIVE_CARDS}個必要です。`); return; }
            if (activeCount < BINGO_RULES.RECOMMENDED_MIN || activeCount > BINGO_RULES.RECOMMENDED_MAX) {
                customConfirm(`カード数が ${activeCount} 個です。ビンゴの性質上 ${BINGO_RULES.RECOMMENDED_MIN}〜${BINGO_RULES.RECOMMENDED_MAX}個 を推奨しますが反映しますか？`, yes => { if(yes) finalizeSave(); });
                return;
            }
        }
        finalizeSave();
    };

    function finalizeSave() {
        if (isStarted && currentIndex >= 0 && currentIndex < shuffled.length - 1) {
            customConfirm("設定を反映すると進行中のビンゴがリセットされますがよろしいですか？", yes => {
                if(yes) executeFinalize();
            });
        } else executeFinalize();
    }
    
    function executeFinalize() {
        config.activeIndex = editingIndex; saveConfig();
        settingsOverlay.style.display = 'none'; applyConfigToMain();
    }

    // 起動処理
    initInputAutoSize();
    applyConfigToMain();
});
</script>
</body>
</html>
