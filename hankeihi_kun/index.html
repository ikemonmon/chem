<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>限界半径比いじくるくん</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --panel-bg: rgba(255, 255, 255, 0.92);
            --primary: #007aff;
            --danger: #ff3b30;
            --success: #34c759;
            --warning: #ff9500;
            --btn-height: 34px;
        }
        
        html, body { 
            margin: 0; padding: 0; overflow: hidden; 
            font-family: -apple-system, sans-serif; 
            background-color: var(--bg-color); 
            touch-action: none; 
            overscroll-behavior: none; 
        }
        
        #ui-panel {
            position: absolute; width: 300px;
            background: var(--panel-bg); backdrop-filter: blur(15px);
            padding: 18px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            z-index: 100; border: 1px solid rgba(0,0,0,0.08);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s;
            max-height: 85vh; overflow-y: auto;
            overscroll-behavior: contain; touch-action: pan-y;
        }

        @media (min-width: 600px) {
            #ui-panel { top: 70px; right: 15px; }
            #ui-panel.hidden { transform: translateX(350px); opacity: 0; pointer-events: none; }
        }
        @media (max-width: 599px) {
            #ui-panel { bottom: 20px; left: 50%; transform: translateX(-50%); width: 85%; }
            #ui-panel.hidden { transform: translate(-50%, 120%); opacity: 0; pointer-events: none; }
        }

        #toggle-panel-btn {
            position: absolute; top: 15px; right: 15px; z-index: 110;
            padding: 10px 18px; border-radius: 50px; border: none;
            background: var(--primary); color: white; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 12px rgba(0,122,255,0.3);
            display: flex; align-items: center; gap: 6px; font-size: 0.9rem;
            transition: background 0.3s, transform 0.2s;
        }
        #toggle-panel-btn:active { transform: scale(0.95); }

        .label-text { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 600; margin-bottom: 2px; color: #555; align-items: center; }
        
        .btn-group { display: flex; gap: 8px; margin-bottom: 12px; height: var(--btn-height); }
        .btn-group button { flex: 1; border: none; border-radius: 8px; background: rgba(0,0,0,0.05); cursor: pointer; font-size: 0.75rem; font-weight: bold; transition: 0.2s; height: 100%; display: flex; align-items: center; justify-content: center; padding: 0; box-sizing: border-box; }
        .type-btns button.active, .bg-btns button.active { background: var(--primary) !important; color: white !important; border-color: transparent !important; }
        
        .toggle-btn { height: var(--btn-height); border-radius: 8px; border: 1.5px solid var(--primary); background: transparent; color: var(--primary); font-weight: bold; cursor: pointer; font-size: 0.75rem; transition: 0.2s; box-sizing: border-box; display: flex; align-items: center; justify-content: center; padding: 0; width: 100%; }
        .toggle-btn.active { background: var(--primary); color: white; }
        .toggle-btn.disabled { opacity: 0.3; pointer-events: none; filter: grayscale(1); }

        .mini-btn-group { display: flex; gap: 4px; height: var(--btn-height); box-sizing: border-box; }
        .mini-btn-group button { flex: 1; border: 1.5px solid var(--primary); background: transparent; color: var(--primary); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; transition: 0.2s; }
        .mini-btn-group button.active { background: var(--primary); color: white; }

        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; height: 36px; margin: 0; cursor: pointer; touch-action: auto; transition: 0.3s; }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 6px; background: #d1d1d6; border-radius: 3px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 26px; width: 26px; border-radius: 50%; background: var(--primary); margin-top: -10px; box-shadow: 0 2px 6px rgba(0,0,0,0.25); }
        input[type="range"]:disabled::-webkit-slider-thumb { background: #999; box-shadow: none; }
        
        #stability-info { font-size: 0.7rem; white-space: nowrap; font-weight: bold; }
        #toggle-ratio-pin { width: 32px; height: 32px; border-radius: 3px; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; padding: 0; }
        .stable { color: var(--success); }
        .unstable { color: var(--danger); }
        .opacity-row { display: flex; align-items: center; margin-bottom: 2px; transition: opacity 0.3s; }
        
        .opacity-label { font-size: 0.8rem; font-weight: 600; width: 65px; white-space: nowrap; }

        .cam-btn-container { flex: 1; display: flex; background: rgba(0,0,0,0.05); border-radius: 8px; padding: 2px; box-sizing: border-box; height: 100%; }
        .cam-btn { flex: 1; height: 100%; border: none; background: transparent; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #888; transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); padding: 0; margin: 0; }
        .cam-btn.active { background: var(--primary); color: white; box-shadow: 0 2px 6px rgba(0,122,255,0.3); }
        
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 8px; margin-bottom: 12px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<button id="toggle-panel-btn">✕ 設定を閉じる</button>

<div id="ui-panel">
    <div class="btn-group">
        <button id="toggle-fullscreen" class="toggle-btn" style="border-width: 1.5px;">全画面</button>
        <button id="toggle-pin" class="toggle-btn active" style="border-width: 1.5px;">パネル固定</button>
        <div class="cam-btn-container">
            <button id="btn-persp" class="cam-btn active" title="透視投影 (パースあり)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="5" width="18" height="14" rx="1"></rect>
                    <rect x="8" y="9" width="8" height="6" rx="1"></rect>
                    <line x1="3" y1="5" x2="8" y2="9"></line>
                    <line x1="21" y1="5" x2="16" y2="9"></line>
                    <line x1="3" y1="19" x2="8" y2="15"></line>
                    <line x1="21" y1="19" x2="16" y2="15"></line>
                </svg>
            </button>
            <button id="btn-ortho" class="cam-btn" title="平行投影 (パースなし)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                    <line x1="12" y1="22.08" x2="12" y2="12"></line>
                </svg>
            </button>
        </div>
    </div>

    <div class="btn-group type-btns" id="crystal-type-group">
        <button data-type="CsCl">CsCl型</button>
        <button data-type="NaCl" class="active">NaCl型</button>
        <button data-type="ZnS">ZnS型</button>
    </div>

    <div class="control-group" style="margin-bottom: 10px;">
        <div class="label-text">
            <span>半径比：陽/陰</span>
            <div>
                <span id="ratio-display" style="font-weight:bold; margin-right:4px;">0.414</span>
                <span id="stability-info">○ 安定</span>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 4px;">
            <button id="toggle-ratio-pin" class="toggle-btn active" title="半径比を固定">📍</button>
            <input type="range" id="ratio-slider" min="0" max="1" step="0.001" style="flex: 1;">
        </div>
    </div>
    
    <div class="control-grid">
        <button id="toggle-size-mode" class="toggle-btn active" data-prop="isFixedBoxMode">格子サイズ固定</button>
        <button id="toggle-clipping" class="toggle-btn active" data-prop="isClipping">格子切り出し</button>
        
        <button id="toggle-avoid-overlap" class="toggle-btn active" data-prop="isAvoidOverlap">重なり回避</button>
        <button id="toggle-diagonal" class="toggle-btn" data-prop="isDiagonalMode">対角断面</button>
        
        <button id="btn-reset-pos" class="toggle-btn" style="color: #333; border-color: transparent; background: #e0e0e0;">位置をリセット</button>
        <button id="btn-snap-diagonal" class="toggle-btn disabled">対角断面正面</button>
    </div>
    
    <div class="control-group" style="margin-bottom: 12px;">
        <div class="label-text" style="margin-bottom: 4px;"><span>不透明度</span></div>
        <div class="opacity-row" id="opacity-p-row">
            <span class="opacity-label" style="color: #ff4d4f;">陽：<span id="opacity-p-display">70%</span></span>
            <input type="range" id="opacity-p-slider" min="0" max="1.0" step="0.01" value="0.70" style="flex: 1;">
        </div>
        <div class="opacity-row" id="opacity-m-row">
            <span class="opacity-label" style="color: #007aff;">陰：<span id="opacity-m-display">60%</span></span>
            <input type="range" id="opacity-m-slider" min="0" max="1.0" step="0.01" value="0.60" style="flex: 1;">
        </div>
    </div>

    <div class="control-grid" style="margin-bottom: 10px;">
        <div class="mini-btn-group" id="grid-mode-group">
            <button data-mode="0" class="active" title="単位格子">
                <svg viewBox="1 1 22 22" width="28" height="28" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linejoin="round">
                    <polygon points="12,5 19,8.5 12,12 5,8.5"></polygon>
                    <polygon points="5,8.5 12,12 12,19 5,15.5"></polygon>
                    <polygon points="12,12 19,8.5 19,15.5 12,19"></polygon>
                </svg>
            </button>
            <button data-mode="1" title="田の字">
                <svg viewBox="1 1 22 22" width="28" height="28" stroke="currentColor" fill="none" stroke-width="1.2" stroke-linejoin="round">
                    <polygon points="12,5 21,9.5 12,14 3,9.5"></polygon>
                    <line x1="7.5" y1="7.25" x2="16.5" y2="11.75"></line>
                    <line x1="16.5" y1="7.25" x2="7.5" y2="11.75"></line>
                    <polygon points="3,9.5 12,14 12,19 3,14.5"></polygon>
                    <line x1="7.5" y1="11.75" x2="7.5" y2="16.75"></line>
                    <polygon points="12,14 21,9.5 21,14.5 12,19"></polygon>
                    <line x1="16.5" y1="11.75" x2="16.5" y2="16.75"></line>
                </svg>
            </button>
            <button data-mode="2" title="オクト立方">
                <svg viewBox="1 1 22 22" width="28" height="28" stroke="currentColor" fill="none" stroke-width="1" stroke-linejoin="round">
                    <polygon points="12,2 22,7 12,12 2,7"></polygon>
                    <line x1="7" y1="4.5" x2="17" y2="9.5"></line>
                    <line x1="17" y1="4.5" x2="7" y2="9.5"></line>
                    <polygon points="2,7 12,12 12,22 2,17"></polygon>
                    <line x1="7" y1="9.5" x2="7" y2="19.5"></line>
                    <line x1="2" y1="12" x2="12" y2="17"></line>
                    <polygon points="12,12 22,7 22,17 12,22"></polygon>
                    <line x1="17" y1="9.5" x2="17" y2="19.5"></line>
                    <line x1="12" y1="17" x2="22" y2="12"></line>
                </svg>
            </button>
        </div>
        <button id="toggle-quality" class="toggle-btn" data-prop="isLowQuality" style="border-color: var(--warning); color: var(--warning);">軽量モード</button>
    </div>

    <div class="btn-group bg-btns" id="bg-color-group" style="margin-bottom: 0;">
        <button data-color="white" class="active" style="background:#fff; border:1px solid #ccc;">白</button>
        <button data-color="gray" style="background:#888; color:white;">灰</button>
        <button data-color="black" style="background:#222; color:white;">黒</button>
    </div>
</div>

<script>
    window.onload = () => { if (typeof THREE !== 'undefined') initSim(); };

    const CONFIG = {
        crystals: {
            NaCl: { min: 0.414, max: 2.415 },
            CsCl: { min: 0.732, max: 1.366 },
            ZnS:  { min: 0.225, max: 4.444 }
        },
        colors: {
            cation: 0xFFB6C1, 
            anion: 0xADD8E6,  
            grid: 0x007aff,
            auxYellow: 0xffff00, 
            auxGreen:  0x00ff00, 
            auxPink:   0xff00cc, 
            auxPurple: 0xbf00ff, 
            auxCyan:   0x00ffff  
        },
        snapPoints: [0.225, 0.414, 0.732, 1.0, 1.366, 2.415, 4.444],
        ratioMap: {
            min: 0.10, max: 3.5, mid: 0.792,
            get k() { return Math.log((this.mid - this.min) / (this.max - this.min)) / Math.log(0.5); },
            toRatio(t) { return (this.max - this.min) * Math.pow(t, this.k) + this.min; },
            toSlider(v) { return Math.pow(Math.max(0, Math.min(1, (v - this.min) / (this.max - this.min))), 1 / this.k); }
        }
    };

    const STATE = {
        type: 'NaCl',
        ratio: 0.414,
        rMinus: 1.0,
        opacityP: 0.70,
        opacityM: 0.60,
        savedOpacityP: 0.70,
        savedOpacityM: 0.60,
        isOpacityForced: false, 
        isClipping: true,
        isCapsVisible: true,
        isFixedBoxMode: true,
        isAvoidOverlap: true,
        isLowQuality: false,
        isPanelPinned: true,
        isRatioPinned: true,
        isDiagonalMode: false,
        isOrthographic: false, 
        gridMode: 0, 
        auxLinesState: 0, 
        savedFixedA: 0, 
        viewOffsetX: 0,
        viewOffsetY: 0,
        currentCenter: new THREE.Vector3()
    };

    function disposeHierarchy(node) {
        if (!node) return;
        if (node.children) {
            for (let i = node.children.length - 1; i >= 0; i--) {
                disposeHierarchy(node.children[i]);
            }
        }
        if (node.geometry) node.geometry.dispose();
        if (node.material) {
            if (Array.isArray(node.material)) {
                node.material.forEach(mat => mat.dispose());
            } else {
                node.material.dispose();
            }
        }
        if (node.parent) node.parent.remove(node);
    }

    function initSim() {
        let scene, activeCamera, cameraP, cameraO, renderer, controls;
        let atomsGroup, gridFrame, diagonalLinesGroup, surfaceLinesGroup, boxEdgesGroup;
        let isRightDown = false, isTouchPan = false, isPointerDown = false;
        let lastPanX = 0, lastPanY = 0, lastClickTime = 0;
        let pointerDownPos = new THREE.Vector2();
        let currentPlanes = []; 
        let clickTimer = null; 
        
        let isAnimatingCamera = false;
        let cameraAnimProgress = 0;
        let startCamPos = new THREE.Vector3(), endCamPos = new THREE.Vector3();
        let startTarget = new THREE.Vector3(), endTarget = new THREE.Vector3();
        let startUp = new THREE.Vector3(), endUp = new THREE.Vector3(0, 1, 0);
        let startZoom = 1, endZoom = 1;

        const DOM = {
            panel: document.getElementById('ui-panel'),
            togglePanelBtn: document.getElementById('toggle-panel-btn'),
            ratioDisplay: document.getElementById('ratio-display'),
            stabilityInfo: document.getElementById('stability-info'),
            opacityPDisplay: document.getElementById('opacity-p-display'),
            opacityMDisplay: document.getElementById('opacity-m-display'),
            ratioSlider: document.getElementById('ratio-slider'),
            ratioPinBtn: document.getElementById('toggle-ratio-pin'),
            opacityPSlider: document.getElementById('opacity-p-slider'),
            opacityMSlider: document.getElementById('opacity-m-slider'),
            opacityPRow: document.getElementById('opacity-p-row'),
            opacityMRow: document.getElementById('opacity-m-row'),
            clippingBtn: document.getElementById('toggle-clipping'),
            diagonalBtn: document.getElementById('toggle-diagonal'),
            snapDiagonalBtn: document.getElementById('btn-snap-diagonal'),
            btnPersp: document.getElementById('btn-persp'),
            btnOrtho: document.getElementById('btn-ortho')
        };

        const calculateRealA = (type, rP, rM, avoidOverlap) => {
            const standardA = (type === 'NaCl') ? 2 * (rP + rM) : 
                              (type === 'CsCl') ? 2 * (rP + rM) / Math.sqrt(3) : 
                              4 * (rP + rM) / Math.sqrt(3);
            if (!avoidOverlap) return standardA;
            if (type === 'NaCl') return Math.max(2 * (rP + rM), 2 * Math.sqrt(2) * rM, 2 * Math.sqrt(2) * rP);
            if (type === 'CsCl') return Math.max(2 * (rP + rM) / Math.sqrt(3), 2 * rM, 2 * rP);
            return Math.max(4 * (rP + rM) / Math.sqrt(3), 2 * Math.sqrt(2) * rM, 2 * Math.sqrt(2) * rP);
        };

        const initThreeJS = () => {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf8f9fa);
            
            const aspect = window.innerWidth / window.innerHeight;
            cameraP = new THREE.PerspectiveCamera(40, aspect, 0.1, 1000);
            cameraP.position.set(10, 8, 12);
            
            const dist = 10;
            const vH = 2 * dist * Math.tan(THREE.MathUtils.degToRad(40 / 2));
            cameraO = new THREE.OrthographicCamera(-vH * aspect / 2, vH * aspect / 2, vH / 2, -vH / 2, 0.1, 1000);
            cameraO.position.set(10, 8, 12);
            
            activeCamera = cameraP;
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.localClippingEnabled = true;
            document.body.appendChild(renderer.domElement);
            
            controls = new THREE.OrbitControls(activeCamera, renderer.domElement);
            controls.enableDamping = true;
            controls.enablePan = false;
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const dLight = new THREE.DirectionalLight(0xffffff, 0.4);
            dLight.position.set(10, 20, 10);
            scene.add(dLight);
            
            atomsGroup = new THREE.Group(); scene.add(atomsGroup);
            diagonalLinesGroup = new THREE.Group(); scene.add(diagonalLinesGroup);
            surfaceLinesGroup = new THREE.Group(); scene.add(surfaceLinesGroup);
            boxEdgesGroup = new THREE.Group(); scene.add(boxEdgesGroup);
        };

        const syncCameras = (toOrtho) => {
            const aspect = window.innerWidth / window.innerHeight;
            if (toOrtho) {
                const dist = cameraP.position.distanceTo(controls.target);
                const vH = 2 * dist * Math.tan(THREE.MathUtils.degToRad(cameraP.fov / 2));
                cameraO.left = -vH * aspect / 2;
                cameraO.right = vH * aspect / 2;
                cameraO.top = vH / 2;
                cameraO.bottom = -vH / 2;
                cameraO.position.copy(cameraP.position);
                cameraO.quaternion.copy(cameraP.quaternion);
                cameraO.zoom = 1;
                cameraO.updateProjectionMatrix();
                activeCamera = cameraO;
            } else {
                const vH_current = (cameraO.top - cameraO.bottom) / cameraO.zoom;
                const dist_new = vH_current / (2 * Math.tan(THREE.MathUtils.degToRad(cameraP.fov / 2)));
                const dir = new THREE.Vector3().subVectors(cameraO.position, controls.target).normalize();
                if(dir.lengthSq() < 0.0001) dir.set(0, 0, 1);
                cameraP.position.copy(controls.target).add(dir.multiplyScalar(dist_new));
                cameraP.quaternion.copy(cameraO.quaternion);
                cameraP.updateProjectionMatrix();
                activeCamera = cameraP;
            }
            controls.object = activeCamera;
            controls.update();
        };

        const updateOpacityUI = () => {
            DOM.opacityPSlider.value = STATE.opacityP;
            DOM.opacityMSlider.value = STATE.opacityM;
            DOM.opacityPDisplay.innerText = Math.round(STATE.opacityP * 100) + '%';
            DOM.opacityMDisplay.innerText = Math.round(STATE.opacityM * 100) + '%';
            
            if (STATE.isOpacityForced) {
                DOM.opacityPSlider.disabled = true;
                DOM.opacityMSlider.disabled = true;
                DOM.opacityPRow.style.opacity = '0.5';
                DOM.opacityMRow.style.opacity = '0.5';
            } else {
                DOM.opacityPSlider.disabled = false;
                DOM.opacityMSlider.disabled = false;
                DOM.opacityPRow.style.opacity = '1';
                DOM.opacityMRow.style.opacity = '1';
            }
        };

        const checkOpacityForceState = () => {
            const shouldForce = STATE.auxLinesState > 0;
            if (shouldForce && !STATE.isOpacityForced) {
                STATE.savedOpacityP = STATE.opacityP;
                STATE.savedOpacityM = STATE.opacityM;
                STATE.opacityP = 1.0;
                STATE.opacityM = 1.0;
                STATE.isOpacityForced = true;
                updateOpacityUI();
            } else if (!shouldForce && STATE.isOpacityForced) {
                STATE.opacityP = STATE.savedOpacityP;
                STATE.opacityM = STATE.savedOpacityM;
                STATE.isOpacityForced = false;
                updateOpacityUI();
            }
        };

        const updateScene = () => {
            while(atomsGroup.children.length > 0){ disposeHierarchy(atomsGroup.children[0]); }
            while(diagonalLinesGroup.children.length > 0){ disposeHierarchy(diagonalLinesGroup.children[0]); }
            while(surfaceLinesGroup.children.length > 0){ disposeHierarchy(surfaceLinesGroup.children[0]); }
            while(boxEdgesGroup.children.length > 0){ disposeHierarchy(boxEdgesGroup.children[0]); }
            if (gridFrame) { disposeHierarchy(gridFrame); gridFrame = null; }

            const a = calculateRealA(STATE.type, STATE.ratio, STATE.rMinus, STATE.isAvoidOverlap);
            let draw_a = a, draw_rP = STATE.ratio, draw_rM = STATE.rMinus;

            if (STATE.isFixedBoxMode) {
                const scale = STATE.savedFixedA / a;
                draw_a = STATE.savedFixedA;
                draw_rP *= scale;
                draw_rM *= scale;
            }

            const multX = STATE.gridMode > 0 ? 2 : 1;
            const multY = STATE.gridMode === 2 ? 2 : 1;
            const multZ = STATE.gridMode > 0 ? 2 : 1;

            const newCenter = new THREE.Vector3(draw_a * multX / 2, draw_a * multY / 2, draw_a * multZ / 2);
            if (STATE.currentCenter.lengthSq() === 0) {
                STATE.currentCenter.copy(newCenter);
                controls.target.copy(newCenter);
            } else if (!isAnimatingCamera) {
                const shift = newCenter.clone().sub(STATE.currentCenter);
                controls.target.add(shift);
                activeCamera.position.add(shift);
                STATE.currentCenter.copy(newCenter);
            }

            let planes = [];
            let diagonalPlane = null;
            
            if (STATE.isClipping) {
                planes = [
                    new THREE.Plane(new THREE.Vector3( 1, 0, 0), 0), new THREE.Plane(new THREE.Vector3(-1, 0, 0), draw_a * multX),
                    new THREE.Plane(new THREE.Vector3( 0, 1, 0), 0), new THREE.Plane(new THREE.Vector3( 0,-1, 0), draw_a * multY),
                    new THREE.Plane(new THREE.Vector3( 0, 0, 1), 0), new THREE.Plane(new THREE.Vector3( 0, 0,-1), draw_a * multZ)
                ];
                if (STATE.isDiagonalMode) {
                    const normal = new THREE.Vector3(-1, 0, 1).normalize();
                    diagonalPlane = new THREE.Plane(normal, 0);
                    planes.push(diagonalPlane);
                }
            }
            currentPlanes = planes; 

            const segments = STATE.isLowQuality ? 16 : 32;
            const baseSphereGeo = new THREE.SphereGeometry(1, segments, segments);
            const matP = new THREE.MeshPhongMaterial({ color: CONFIG.colors.cation, clippingPlanes: planes, transparent: true, opacity: STATE.opacityP, shininess: 40 });
            const matM = new THREE.MeshPhongMaterial({ color: CONFIG.colors.anion, clippingPlanes: planes, transparent: true, opacity: STATE.opacityM, shininess: 40 });

            const addIon = (radius, isCation, px, py, pz) => {
                const currentOpacity = isCation ? STATE.opacityP : STATE.opacityM;
                if (currentOpacity <= 0) return;

                const mesh = new THREE.Mesh(baseSphereGeo, isCation ? matP : matM);
                mesh.scale.set(radius, radius, radius);
                mesh.position.set(px, py, pz);
                atomsGroup.add(mesh);

                if (STATE.isClipping && STATE.isCapsVisible) {
                    planes.forEach(plane => {
                        const dist = plane.distanceToPoint(mesh.position);
                        if (Math.abs(dist) < radius) {
                            const capR = Math.sqrt(radius * radius - dist * dist);
                            const capMat = new THREE.MeshBasicMaterial({ 
                                color: isCation ? CONFIG.colors.cation : CONFIG.colors.anion,
                                side: THREE.DoubleSide, clippingPlanes: planes, 
                                transparent: true, opacity: Math.min(currentOpacity + 0.2, 1.0), 
                                polygonOffset: true, polygonOffsetFactor: -1 
                            });
                            const cap = new THREE.Mesh(new THREE.CircleGeometry(capR, segments), capMat);
                            const pos = mesh.position.clone().add(plane.normal.clone().multiplyScalar(-dist + 0.001));
                            cap.position.copy(pos);
                            cap.lookAt(pos.clone().add(plane.normal));
                            if (STATE.isDiagonalMode && plane === diagonalPlane) cap.userData.isDiagonalPlane = true;
                            atomsGroup.add(cap);
                        }
                    });
                }
            };

            if (STATE.type === 'NaCl') {
                for(let x=0; x<=multX; x+=0.5)
                for(let y=0; y<=multY; y+=0.5)
                for(let z=0; z<=multZ; z+=0.5) {
                    if ((x+y+z)%1 === 0) addIon(draw_rM, false, x*draw_a, y*draw_a, z*draw_a);
                    else addIon(draw_rP, true, x*draw_a, y*draw_a, z*draw_a);
                }
            } else if (STATE.type === 'CsCl') {
                for(let x=0; x<=multX; x++)
                for(let y=0; y<=multY; y++)
                for(let z=0; z<=multZ; z++) {
                    addIon(draw_rM, false, x*draw_a, y*draw_a, z*draw_a);
                }
                for(let x=0; x<multX; x++)
                for(let y=0; y<multY; y++)
                for(let z=0; z<multZ; z++) {
                    addIon(draw_rP, true, x*draw_a + draw_a/2, y*draw_a + draw_a/2, z*draw_a + draw_a/2);
                }
            } else { 
                for(let x=0; x<=multX; x+=0.5)
                for(let y=0; y<=multY; y+=0.5)
                for(let z=0; z<=multZ; z+=0.5) {
                    if((x+y+z)%1===0 && (x%1===0||y%1===0||z%1===0)) 
                        addIon(draw_rM, false, x*draw_a, y*draw_a, z*draw_a);
                }
                for(let cx=0; cx<multX; cx++)
                for(let cy=0; cy<multY; cy++)
                for(let cz=0; cz<multZ; cz++) {
                    [[1/4,1/4,1/4], [3/4,3/4,1/4], [1/4,3/4,3/4], [3/4,1/4,3/4]].forEach(p => 
                        addIon(draw_rP, true, (cx+p[0])*draw_a, (cy+p[1])*draw_a, (cz+p[2])*draw_a)
                    );
                }
            }

            const createLineObj = (p1, p2, colorHex, opacity, depthTest, usePlanes) => {
                const matParams = { 
                    color: colorHex, 
                    transparent: true, 
                    opacity: opacity, 
                    depthTest: depthTest, 
                    side: THREE.DoubleSide,
                    polygonOffset: true,
                    polygonOffsetFactor: -2,
                    polygonOffsetUnits: -2
                };
                if (usePlanes) matParams.clippingPlanes = planes;

                const mat = new THREE.MeshBasicMaterial(matParams);
                const dist = p1.distanceTo(p2);
                const geo = new THREE.CylinderGeometry(draw_a * 0.0015, draw_a * 0.0015, dist, 6, 1, false);
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.copy(p1).lerp(p2, 0.5);
                
                if (dist > 0.0001) {
                    const dir = new THREE.Vector3().subVectors(p2, p1).normalize();
                    mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
                }
                return mesh;
            };

            if (STATE.auxLinesState > 0) {
                const colorDiagonal1 = STATE.auxLinesState === 1 ? CONFIG.colors.auxYellow : CONFIG.colors.auxPink;
                const colorDiagonal2 = STATE.auxLinesState === 1 ? CONFIG.colors.auxGreen : CONFIG.colors.auxPurple;
                
                const faces = [
                    { n: [0,0,1],  c: [draw_a/2, draw_a/2, draw_a], pts: [ [0,0,draw_a, draw_a,draw_a,draw_a], [0,draw_a,draw_a, draw_a,0,draw_a] ] },
                    { n: [0,0,-1], c: [draw_a/2, draw_a/2, 0],      pts: [ [0,0,0, draw_a,draw_a,0], [0,draw_a,0, draw_a,0,0] ] },
                    { n: [1,0,0],  c: [draw_a, draw_a/2, draw_a/2], pts: [ [draw_a,0,0, draw_a,draw_a,draw_a], [draw_a,draw_a,0, draw_a,0,draw_a] ] },
                    { n: [-1,0,0], c: [0, draw_a/2, draw_a/2],      pts: [ [0,0,0, 0,draw_a,draw_a], [0,draw_a,0, 0,0,draw_a] ] },
                    { n: [0,1,0],  c: [draw_a/2, draw_a, draw_a/2], pts: [ [0,draw_a,0, draw_a,draw_a,draw_a], [0,draw_a,draw_a, draw_a,draw_a,0] ] },
                    { n: [0,-1,0], c: [draw_a/2, 0, draw_a/2],      pts: [ [0,0,0, draw_a,0,draw_a], [0,0,draw_a, draw_a,0,0] ] }
                ];

                const edges = [
                    { pts: [0,0,0, draw_a,0,0], normals: [[0,-1,0], [0,0,-1]] },
                    { pts: [0,0,0, 0,0,draw_a], normals: [[0,-1,0], [-1,0,0]] },
                    { pts: [draw_a,0,0, draw_a,0,draw_a], normals: [[0,-1,0], [1,0,0]] },
                    { pts: [0,0,draw_a, draw_a,0,draw_a], normals: [[0,-1,0], [0,0,1]] },
                    { pts: [0,draw_a,0, draw_a,draw_a,0], normals: [[0,1,0], [0,0,-1]] },
                    { pts: [0,draw_a,0, 0,draw_a,draw_a], normals: [[0,1,0], [-1,0,0]] },
                    { pts: [draw_a,draw_a,0, draw_a,draw_a,draw_a], normals: [[0,1,0], [1,0,0]] },
                    { pts: [0,draw_a,draw_a, draw_a,draw_a,draw_a], normals: [[0,1,0], [0,0,1]] },
                    { pts: [0,0,0, 0,draw_a,0], normals: [[-1,0,0], [0,0,-1]] },
                    { pts: [draw_a,0,0, draw_a,draw_a,0], normals: [[1,0,0], [0,0,-1]] },
                    { pts: [0,0,draw_a, 0,draw_a,draw_a], normals: [[-1,0,0], [0,0,1]] },
                    { pts: [draw_a,0,draw_a, draw_a,draw_a,draw_a], normals: [[1,0,0], [0,0,1]] }
                ];

                const ox = 0;
                const oy = 0;
                const oz = 0;

                faces.forEach(f => {
                    const faceGroup = new THREE.Group();
                    faceGroup.userData.normal = new THREE.Vector3(...f.n);
                    faceGroup.userData.center = new THREE.Vector3(...f.c).add(new THREE.Vector3(ox, oy, oz));
                    
                    f.pts.forEach((pts, idx) => {
                        const p1 = new THREE.Vector3(pts[0]+ox, pts[1]+oy, pts[2]+oz);
                        const p2 = new THREE.Vector3(pts[3]+ox, pts[4]+oy, pts[5]+oz);
                        const color = (idx % 2 === 0) ? colorDiagonal1 : colorDiagonal2;
                        const line = createLineObj(p1, p2, color, 1.0, true, true);
                        line.renderOrder = 997; 
                        faceGroup.add(line);
                    });
                    surfaceLinesGroup.add(faceGroup);
                });

                edges.forEach(e => {
                    const p1 = new THREE.Vector3(e.pts[0]+ox, e.pts[1]+oy, e.pts[2]+oz);
                    const p2 = new THREE.Vector3(e.pts[3]+ox, e.pts[4]+oy, e.pts[5]+oz);
                    const line = createLineObj(p1, p2, CONFIG.colors.auxCyan, 1.0, true, true);
                    line.renderOrder = 996;
                    line.userData.normals = e.normals.map(n => new THREE.Vector3(...n));
                    line.userData.center = new THREE.Vector3().copy(p1).lerp(p2, 0.5);
                    boxEdgesGroup.add(line);
                });

                if (STATE.isDiagonalMode) {
                    const d_pts = [
                        [new THREE.Vector3(0, 0, 0), new THREE.Vector3(draw_a, 0, draw_a)],
                        [new THREE.Vector3(draw_a, 0, draw_a), new THREE.Vector3(draw_a, draw_a, draw_a)],
                        [new THREE.Vector3(draw_a, draw_a, draw_a), new THREE.Vector3(0, draw_a, 0)],
                        [new THREE.Vector3(0, draw_a, 0), new THREE.Vector3(0, 0, 0)]
                    ];
                    d_pts.forEach(pair => {
                        const line = createLineObj(pair[0], pair[1], CONFIG.colors.auxCyan, 1.0, true, false);
                        line.renderOrder = 998;
                        diagonalLinesGroup.add(line);
                    });

                    if (STATE.type === 'ZnS') {
                        const midX = draw_a / 2;
                        const lineV = createLineObj(new THREE.Vector3(midX+ox, 0, midX+oz), new THREE.Vector3(midX+ox, draw_a, midX+oz), CONFIG.colors.auxCyan, 1.0, true, false);
                        const lineH = createLineObj(new THREE.Vector3(ox, midX, oz), new THREE.Vector3(draw_a+ox, midX, draw_a+oz), CONFIG.colors.auxCyan, 1.0, true, false);
                        lineV.renderOrder = 999; lineH.renderOrder = 999;
                        diagonalLinesGroup.add(lineV); diagonalLinesGroup.add(lineH);

                        const lineShort1 = createLineObj(new THREE.Vector3(draw_a+ox, midX, draw_a+oz), new THREE.Vector3(midX+ox, 0, midX+oz), colorDiagonal1, 1.0, true, false);
                        const lineShort2 = createLineObj(new THREE.Vector3(ox, midX, oz), new THREE.Vector3(midX+ox, 0, midX+oz), colorDiagonal2, 1.0, true, false);
                        lineShort1.renderOrder = 999; lineShort2.renderOrder = 999;
                        diagonalLinesGroup.add(lineShort1); diagonalLinesGroup.add(lineShort2);
                    }
                    
                    const lineDiag1 = createLineObj(new THREE.Vector3(ox, 0, oz), new THREE.Vector3(draw_a+ox, draw_a, draw_a+oz), colorDiagonal1, 1.0, true, false);
                    const lineDiag2 = createLineObj(new THREE.Vector3(ox, draw_a, oz), new THREE.Vector3(draw_a+ox, 0, draw_a+oz), colorDiagonal2, 1.0, true, false);
                    lineDiag1.renderOrder = 999; lineDiag2.renderOrder = 999;
                    diagonalLinesGroup.add(lineDiag1); diagonalLinesGroup.add(lineDiag2);
                }
            }

            if (STATE.isDiagonalMode) {
                const clickPlaneGeo = new THREE.PlaneGeometry(Math.sqrt(2) * draw_a, draw_a);
                const clickPlaneMat = new THREE.MeshBasicMaterial({ visible: false, depthTest: false });
                const clickPanel = new THREE.Mesh(clickPlaneGeo, clickPlaneMat);
                clickPanel.position.set(draw_a/2, draw_a/2, draw_a/2);
                clickPanel.lookAt(new THREE.Vector3(draw_a/2, draw_a/2, draw_a/2).add(new THREE.Vector3(-1, 0, 1)));
                clickPanel.userData.isDiagonalPlane = true;
                diagonalLinesGroup.add(clickPanel);
            }

            gridFrame = new THREE.LineSegments(
                new THREE.EdgesGeometry(new THREE.BoxGeometry(draw_a * multX, draw_a * multY, draw_a * multZ)),
                new THREE.LineBasicMaterial({ color: CONFIG.colors.grid, transparent: true, opacity: 0.3, clippingPlanes: planes })
            );
            gridFrame.position.set(draw_a * multX / 2, draw_a * multY / 2, draw_a * multZ / 2);
            scene.add(gridFrame);

            DOM.ratioDisplay.innerText = STATE.ratio.toFixed(3);
            const lim = CONFIG.crystals[STATE.type];
            if (STATE.ratio < lim.min - 0.0001) {
                DOM.stabilityInfo.innerText = "× 不安定(陰接触)"; DOM.stabilityInfo.className = "unstable";
            } else if (STATE.ratio > lim.max + 0.0001) {
                DOM.stabilityInfo.innerText = "× 不安定(陽接触)"; DOM.stabilityInfo.className = "unstable";
            } else {
                DOM.stabilityInfo.innerText = "○ 安定"; DOM.stabilityInfo.className = "stable";
            }
        };

        const triggerCameraSnap = () => {
            const a = calculateRealA(STATE.type, STATE.ratio, STATE.rMinus, STATE.isAvoidOverlap);
            const draw_a = STATE.isFixedBoxMode ? STATE.savedFixedA : a;
            
            const multX = STATE.gridMode > 0 ? 2 : 1;
            const multY = STATE.gridMode === 2 ? 2 : 1;
            const multZ = STATE.gridMode > 0 ? 2 : 1;
            const span = Math.max(multX, multZ);

            const center = new THREE.Vector3(draw_a * multX / 2, draw_a * multY / 2, draw_a * multZ / 2);
            const normal = new THREE.Vector3(1, 0, -1).normalize();
            
            startCamPos.copy(activeCamera.position);
            startTarget.copy(controls.target);
            startUp.copy(activeCamera.up);
            
            endTarget.copy(center);
            const aspect = window.innerWidth / window.innerHeight;
            const distMulti = aspect < 1 ? (2.2 / aspect) * 0.9 : 2.2; 
            endCamPos.copy(center).add(normal.multiplyScalar(draw_a * span * distMulti));
            
            if (STATE.isOrthographic) {
                startZoom = cameraO.zoom;
                const targetDist = draw_a * span * distMulti;
                const target_vH = 2 * targetDist * Math.tan(THREE.MathUtils.degToRad(cameraP.fov / 2));
                const base_vH = cameraO.top - cameraO.bottom;
                endZoom = base_vH / target_vH;
            }
            
            isAnimatingCamera = true;
            cameraAnimProgress = 0;
        };

        const registerEvents = () => {
            const setPanelVisible = (visible) => {
                visible ? DOM.panel.classList.remove('hidden') : DOM.panel.classList.add('hidden');
                DOM.togglePanelBtn.innerHTML = visible ? '✕ 設定を閉じる' : '≡ 設定を表示';
            };

            DOM.btnPersp.onclick = () => {
                if(!STATE.isOrthographic) return;
                STATE.isOrthographic = false;
                DOM.btnOrtho.classList.remove('active');
                DOM.btnPersp.classList.add('active');
                syncCameras(false);
            };
            DOM.btnOrtho.onclick = () => {
                if(STATE.isOrthographic) return;
                STATE.isOrthographic = true;
                DOM.btnPersp.classList.remove('active');
                DOM.btnOrtho.classList.add('active');
                syncCameras(true);
            };

            document.getElementById('crystal-type-group').addEventListener('click', e => {
                if(e.target.tagName !== 'BUTTON') return;
                const newType = e.target.dataset.type;
                STATE.type = newType;
                if (!STATE.isRatioPinned) {
                    STATE.ratio = CONFIG.crystals[newType].min;
                    DOM.ratioSlider.value = CONFIG.ratioMap.toSlider(STATE.ratio);
                }
                document.querySelectorAll('.type-btns button').forEach(b => b.classList.toggle('active', b === e.target));
                updateScene();
            });

            // SVGボタン切り替えイベント
            const gridModeBtns = document.querySelectorAll('#grid-mode-group button');
            gridModeBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const button = e.currentTarget;
                    STATE.gridMode = parseInt(button.dataset.mode);
                    gridModeBtns.forEach(b => b.classList.remove('active'));
                    button.classList.add('active');
                    updateScene();
                });
            });

            document.querySelectorAll('button[data-prop]').forEach(btn => {
                btn.addEventListener('click', e => {
                    const prop = e.target.dataset.prop;
                    
                    if (prop === 'isDiagonalMode') {
                        if (!STATE.isClipping) return;
                        STATE.isDiagonalMode = !STATE.isDiagonalMode;
                        e.target.classList.toggle('active', STATE.isDiagonalMode);
                        
                        checkOpacityForceState();
                        
                        if (STATE.isDiagonalMode) {
                            DOM.snapDiagonalBtn.classList.remove('disabled');
                        } else {
                            DOM.snapDiagonalBtn.classList.add('disabled');
                        }
                    } else {
                        STATE[prop] = !STATE[prop];
                        e.target.classList.toggle('active', STATE[prop]);
                    }
                    
                    if (prop === 'isFixedBoxMode' && STATE.isFixedBoxMode) {
                        STATE.savedFixedA = calculateRealA(STATE.type, STATE.ratio, STATE.rMinus, STATE.isAvoidOverlap);
                    }
                    if (prop === 'isClipping') {
                        DOM.diagonalBtn.classList.toggle('disabled', !STATE.isClipping);
                        if (!STATE.isClipping && STATE.isDiagonalMode) {
                            STATE.isDiagonalMode = false;
                            DOM.diagonalBtn.classList.remove('active');
                            checkOpacityForceState();
                            DOM.snapDiagonalBtn.classList.add('disabled');
                        }
                    }
                    updateScene();
                });
            });

            DOM.snapDiagonalBtn.onclick = () => {
                if (STATE.isDiagonalMode) {
                    triggerCameraSnap();
                }
            };

            DOM.ratioPinBtn.onclick = (e) => {
                STATE.isRatioPinned = !STATE.isRatioPinned;
                e.target.classList.toggle('active', STATE.isRatioPinned);
            };

            document.getElementById('toggle-pin').onclick = e => {
                STATE.isPanelPinned = !STATE.isPanelPinned;
                e.target.classList.toggle('active', STATE.isPanelPinned);
            };

            DOM.togglePanelBtn.onclick = () => setPanelVisible(DOM.panel.classList.contains('hidden'));

            document.getElementById('toggle-fullscreen').onclick = () => {
                !document.fullscreenElement ? document.documentElement.requestFullscreen() : document.exitFullscreen();
            };

            document.getElementById('btn-reset-pos').onclick = () => {
                STATE.viewOffsetX = 0; STATE.viewOffsetY = 0; applyViewOffset();
                activeCamera.up.set(0, 1, 0);
                
                cameraP.position.set(10, 8, 12); 
                controls.target.copy(STATE.currentCenter);
                
                if(STATE.isOrthographic) {
                    syncCameras(true);
                } else {
                    cameraP.lookAt(STATE.currentCenter);
                    controls.update();
                }
            };

            document.getElementById('bg-color-group').addEventListener('click', e => {
                if(e.target.tagName !== 'BUTTON') return;
                const c = e.target.dataset.color;
                scene.background = new THREE.Color(c === 'white' ? 0xf8f9fa : c === 'gray' ? 0x666666 : 0x050505);
                document.querySelectorAll('.bg-btns button').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
            });

            const handleOpacity = (e, type) => {
                let v = parseFloat(e.target.value);
                if(Math.abs(v - 0.75) < 0.02) v = 0.75;
                e.target.value = v;
                
                if (!STATE.isOpacityForced) {
                    STATE[`opacity${type}`] = v;
                    STATE[`savedOpacity${type}`] = v;
                    updateOpacityUI();
                    updateScene();
                }
            };
            DOM.opacityPSlider.oninput = e => handleOpacity(e, 'P');
            DOM.opacityMSlider.oninput = e => handleOpacity(e, 'M');

            DOM.ratioSlider.oninput = (e) => {
                let t = parseFloat(e.target.value);
                let v = CONFIG.ratioMap.toRatio(t);
                for(let p of CONFIG.snapPoints) { 
                    if(Math.abs(v - p) < 0.035) { v = p; break; } 
                }
                e.target.value = CONFIG.ratioMap.toSlider(v);
                STATE.ratio = v;
                updateScene();
            };

            const applyViewOffset = () => {
                const w = window.innerWidth, h = window.innerHeight;
                const aspect = w / h;
                
                cameraP.aspect = aspect;
                cameraP.setViewOffset(w, h, STATE.viewOffsetX, STATE.viewOffsetY, w, h);
                cameraP.updateProjectionMatrix();
                
                if (cameraO) {
                    const vH = cameraO.top - cameraO.bottom;
                    cameraO.left = -vH * aspect / 2;
                    cameraO.right = vH * aspect / 2;
                    cameraO.setViewOffset(w, h, STATE.viewOffsetX, STATE.viewOffsetY, w, h);
                    cameraO.updateProjectionMatrix();
                }
            };

            window.addEventListener('resize', () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
                applyViewOffset();
            });

            controls.addEventListener('start', () => {
                if (!STATE.isPanelPinned && !DOM.panel.classList.contains('hidden')) setPanelVisible(false);
            });

            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            const canvas = renderer.domElement;

            const getValidIntersects = (clientX, clientY, targets) => {
                mouse.x = (clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, activeCamera);
                let intersects = raycaster.intersectObjects(targets, true);
                
                if (STATE.isClipping && currentPlanes.length > 0) {
                    intersects = intersects.filter(intersect => {
                        for (let i = 0; i < currentPlanes.length; i++) {
                            if (currentPlanes[i].distanceToPoint(intersect.point) < -0.001) {
                                return false;
                            }
                        }
                        return true;
                    });
                }
                return intersects;
            };

            const handleDoubleClick = (clientX, clientY) => {
                const targets = [...atomsGroup.children];
                const intersects = getValidIntersects(clientX, clientY, targets);

                if (intersects.length > 0) {
                    if (STATE.isClipping) {
                        STATE.isDiagonalMode = !STATE.isDiagonalMode;
                        DOM.diagonalBtn.classList.toggle('active', STATE.isDiagonalMode);
                        checkOpacityForceState();
                        
                        if (STATE.isDiagonalMode) {
                            DOM.snapDiagonalBtn.classList.remove('disabled');
                        } else {
                            DOM.snapDiagonalBtn.classList.add('disabled');
                        }
                        updateScene();
                    }
                } else {
                    if (!STATE.isPanelPinned && DOM.panel.classList.contains('hidden')) {
                        setPanelVisible(true);
                    }
                }
            };

            canvas.addEventListener('contextmenu', e => e.preventDefault());

            canvas.addEventListener('pointerdown', e => {
                if (!e.isPrimary) return; 
                if(e.pointerType === 'mouse' && e.button === 2){ isRightDown = true; lastPanX = e.clientX; lastPanY = e.clientY; return; }
                if(e.button === 0) {
                    const now = Date.now();
                    if (now - lastClickTime < 250) { 
                        if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; }
                        handleDoubleClick(e.clientX, e.clientY);
                        lastClickTime = 0;
                        isPointerDown = false;
                    } else {
                        lastClickTime = now;
                        isPointerDown = true;
                        pointerDownPos.set(e.clientX, e.clientY);
                    }
                }
            });

            window.addEventListener('pointermove', e => {
                if(isRightDown){
                    STATE.viewOffsetX -= (e.clientX - lastPanX); STATE.viewOffsetY -= (e.clientY - lastPanY);
                    lastPanX = e.clientX; lastPanY = e.clientY; applyViewOffset();
                }
            });
            
            canvas.addEventListener('pointerup', e => { 
                if (!e.isPrimary) return; 
                if(e.button === 2) isRightDown = false; 
                if(e.button === 0 && isPointerDown) {
                    isPointerDown = false;
                    const dist = Math.hypot(e.clientX - pointerDownPos.x, e.clientY - pointerDownPos.y);
                    if (dist < 5) { 
                        clickTimer = setTimeout(() => {
                            const targets = [...atomsGroup.children];
                            const intersects = getValidIntersects(e.clientX, e.clientY, targets);
                            
                            if (intersects.length > 0) {
                                STATE.auxLinesState = (STATE.auxLinesState + 1) % 3;
                                checkOpacityForceState();
                                updateScene();
                            }
                            clickTimer = null;
                        }, 200); 
                    }
                }
            });

            canvas.addEventListener('touchstart', e => {
                if(e.touches.length === 2){
                    isTouchPan = true;
                    lastPanX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    lastPanY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                }
            }, {passive: false});

            window.addEventListener('touchmove', e => {
                if(isTouchPan && e.touches.length === 2){
                    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2, cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                    STATE.viewOffsetX -= (cx - lastPanX); STATE.viewOffsetY -= (cy - lastPanY);
                    lastPanX = cx; lastPanY = cy; applyViewOffset();
                }
            }, {passive: true});
            window.addEventListener('touchend', () => isTouchPan = false);
        };

        const animate = () => { 
            requestAnimationFrame(animate); 
            
            if (isAnimatingCamera) {
                cameraAnimProgress += 0.016; 
                if (cameraAnimProgress >= 1) {
                    cameraAnimProgress = 1;
                    isAnimatingCamera = false;
                }
                const ease = 1 - Math.pow(1 - cameraAnimProgress, 3);
                activeCamera.position.lerpVectors(startCamPos, endCamPos, ease);
                controls.target.lerpVectors(startTarget, endTarget, ease);
                activeCamera.up.lerpVectors(startUp, endUp, ease).normalize();
                
                if (STATE.isOrthographic) {
                    activeCamera.zoom = THREE.MathUtils.lerp(startZoom, endZoom, ease);
                }
                activeCamera.updateProjectionMatrix();
            }

            if (STATE.auxLinesState > 0 && surfaceLinesGroup) {
                let camDir = new THREE.Vector3();
                activeCamera.getWorldDirection(camDir);
                camDir.negate(); 

                surfaceLinesGroup.children.forEach(faceGroup => {
                    const normal = faceGroup.userData.normal;
                    if (STATE.isOrthographic) {
                        faceGroup.visible = (normal.dot(camDir) > 0);
                    } else {
                        const center = faceGroup.userData.center;
                        const camToCenter = new THREE.Vector3().subVectors(activeCamera.position, center);
                        faceGroup.visible = (camToCenter.dot(normal) > 0);
                    }
                });
            }

            if (STATE.auxLinesState > 0 && boxEdgesGroup) {
                let camDir = new THREE.Vector3();
                activeCamera.getWorldDirection(camDir);
                camDir.negate(); 

                boxEdgesGroup.children.forEach(edgeMesh => {
                    const normals = edgeMesh.userData.normals;
                    let isVisible = false;

                    for (const normal of normals) {
                        if (STATE.isOrthographic) {
                            if (normal.dot(camDir) > 0) { isVisible = true; break; }
                        } else {
                            const edgeCenter = edgeMesh.userData.center;
                            const camToCenter = new THREE.Vector3().subVectors(activeCamera.position, edgeCenter);
                            if (camToCenter.dot(normal) > 0) { isVisible = true; break; }
                        }
                    }
                    edgeMesh.visible = isVisible;
                });
            }

            if (STATE.isDiagonalMode && diagonalLinesGroup) {
                const a = calculateRealA(STATE.type, STATE.ratio, STATE.rMinus, STATE.isAvoidOverlap);
                const draw_a = STATE.isFixedBoxMode ? STATE.savedFixedA : a;
                const multX = STATE.gridMode > 0 ? 2 : 1;
                const multY = STATE.gridMode === 2 ? 2 : 1;
                const multZ = STATE.gridMode > 0 ? 2 : 1;

                const center = new THREE.Vector3(draw_a * multX / 2, draw_a * multY / 2, draw_a * multZ / 2);
                
                const normal = new THREE.Vector3(1, 0, -1).normalize();
                const camToCenter = new THREE.Vector3().subVectors(activeCamera.position, center);
                
                const dot = camToCenter.dot(normal);
                diagonalLinesGroup.visible = (dot > 0);
            }
            
            controls.update(); 
            renderer.render(scene, activeCamera); 
        };

        initThreeJS();
        registerEvents();
        
        STATE.savedFixedA = calculateRealA(STATE.type, STATE.ratio, STATE.rMinus, STATE.isAvoidOverlap);
        DOM.ratioSlider.value = CONFIG.ratioMap.toSlider(STATE.ratio);
        
        updateScene();
        animate();
    }
</script>
</body>
</html>
